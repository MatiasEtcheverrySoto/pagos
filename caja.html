<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Caja</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #111110;
  --surface: #1c1c1a;
  --surface2: #252523;
  --border: #2e2e2b;
  --text: #f0f0ee;
  --text2: #888880;
  --text3: #444440;
  --red: #e05c4b;
  --green: #22c55e;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 20px 0;
}

.page-title {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
}

.cancel-btn {
  font-size: 13px;
  color: var(--text2);
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Geist', sans-serif;
}

.table-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 20px 20px 0;
}

.table-header {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
  padding: 0 2px;
}

.col-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
}

.rows-container {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.row-item {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  align-items: center;
}

.row-num {
  display: none; /* oculto, solo para referencia */
}

.cell-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  color: var(--text);
  outline: none;
  width: 100%;
  caret-color: var(--text2);
  transition: border-color 0.15s;
  color-scheme: dark;
}

.cell-input:focus { border-color: var(--text3); }
.cell-input::placeholder { color: var(--text3); }

/* Número de fila al costado */
.row-number {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  text-align: right;
  padding-right: 4px;
  display: none; /* mostramos en el label */
}

.confirm-wrap {
  padding: 14px 20px 32px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  margin-top: 12px;
}

.btn-confirm {
  width: 100%;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  padding: 15px;
  font-family: 'Geist', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}

.btn-confirm:active { opacity: 0.85; }
.btn-confirm:disabled { opacity: 0.15; cursor: not-allowed; }

/* OVERLAYS */
.overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 100;
  text-align: center;
  padding: 24px;
}

.overlay.show { opacity: 1; pointer-events: all; }

.overlay-icon { font-size: 36px; }
.overlay-title { font-size: 18px; font-weight: 500; }
.overlay-sub { font-size: 12px; color: var(--text2); font-family: 'Geist Mono', monospace; }

.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.skeleton {
  height: 40px;
  background: var(--surface);
  border-radius: 8px;
  border: 1px solid var(--border);
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
</style>
</head>
<body>

<div class="topbar">
  <span class="page-title">Caja · J3:K17</span>
  <button class="cancel-btn" id="btn-cancel">Cancelar</button>
</div>

<div class="table-wrap">
  <div class="table-header">
    <span class="col-label">Col J</span>
    <span class="col-label">Col K</span>
  </div>
  <div class="rows-container" id="rows-container">
    <!-- Skeletons mientras carga -->
    <div class="row-item" id="loading-skeleton">
      <div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
    </div>
  </div>
</div>

<div class="confirm-wrap">
  <button class="btn-confirm" id="btn-confirm" disabled>Registrar cambios</button>
</div>

<div class="overlay" id="ov-loading">
  <div class="spinner"></div>
  <span style="color:var(--text2); font-size:13px">Guardando...</span>
</div>

<div class="overlay" id="ov-ok">
  <span class="overlay-icon">✓</span>
  <span class="overlay-title">Guardado</span>
  <span class="overlay-sub">Caja actualizada</span>
</div>

<div class="overlay" id="ov-error">
  <span class="overlay-icon">✕</span>
  <span class="overlay-title">Error</span>
  <span class="overlay-sub" id="error-msg">No se pudo completar</span>
  <button class="cancel-btn" style="margin-top:12px" onclick="hideAll()">Volver</button>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIVeD1gCQba82X83v2bG1mJdCvLr3CLToXHxXZbhIiV6eYQCDR9llhdUZqbizGJSSG/exec";

const NUM_ROWS = 15; // filas 3 a 17
const START_ROW = 3;

let rowsData = [];

// Cargar datos desde el script
async function loadData() {
  try {
    const res  = await fetch(APPS_SCRIPT_URL + "?action=getCaja");
    const json = await res.json();
    if (json.status === "ok") {
      rowsData = json.data; // array de 15 filas, cada una [colJ, colK]
      renderRows();
    } else {
      showError("Error al cargar: " + (json.msg || ""));
    }
  } catch (err) {
    showError("No se pudo conectar al servidor");
  }
}

function renderRows() {
  const container = document.getElementById("rows-container");
  container.innerHTML = "";

  rowsData.forEach((row, i) => {
    const rowEl = document.createElement("div");
    rowEl.className = "row-item";

    const inputJ = document.createElement("input");
    inputJ.className   = "cell-input";
    inputJ.type        = "text";
    inputJ.value       = row[0] ?? "";
    inputJ.placeholder = `J${START_ROW + i}`;
    inputJ.dataset.row = i;
    inputJ.dataset.col = 0;
    inputJ.addEventListener("input", onEdit);

    const inputK = document.createElement("input");
    inputK.className   = "cell-input";
    inputK.type        = "text";
    inputK.value       = row[1] ?? "";
    inputK.placeholder = `K${START_ROW + i}`;
    inputK.dataset.row = i;
    inputK.dataset.col = 1;
    inputK.addEventListener("input", onEdit);

    rowEl.appendChild(inputJ);
    rowEl.appendChild(inputK);
    container.appendChild(rowEl);
  });

  document.getElementById("btn-confirm").disabled = false;
}

function onEdit(e) {
  const row = parseInt(e.target.dataset.row);
  const col = parseInt(e.target.dataset.col);
  if (!rowsData[row]) rowsData[row] = ["", ""];
  rowsData[row][col] = e.target.value;
}

function showError(msg) {
  document.getElementById("rows-container").innerHTML =
    `<span style="color:var(--text2);font-size:13px;font-family:'Geist Mono',monospace">${msg}</span>`;
}

// Guardar
document.getElementById("btn-confirm").addEventListener("click", async () => {
  showOverlay("ov-loading");
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      keepalive: true,
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        action: "updateCaja",
        data: rowsData
      })
    });
    hideAll();
    showOverlay("ov-ok");
    setTimeout(() => window.close(), 1800);
  } catch {
    hideAll();
    showOverlay("ov-error");
  }
});

document.getElementById("btn-cancel").addEventListener("click", () => window.close());

function showOverlay(id) { hideAll(); document.getElementById(id).classList.add("show"); }
function hideAll() { document.querySelectorAll(".overlay").forEach(o => o.classList.remove("show")); }

// Fullscreen al primer toque
document.addEventListener("click", () => {
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
}, { once: true });

// Arrancar
loadData();
</script>
</body>
</html>
