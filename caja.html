<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Caja</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #111110;
  --surface: #1c1c1a;
  --border: #2e2e2b;
  --text: #f0f0ee;
  --text2: #888880;
  --text3: #444440;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

.table-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 24px 20px 0;
  min-height: 0;
}

.table-header {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
  padding: 0 2px;
  flex-shrink: 0;
}

.col-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
}

.rows-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 0;
}

.row-item {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  flex: 1;
  min-height: 0;
}

/* Optimizado con input text para evitar saltos de línea (Enters) accidentales */
.cell-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  color: var(--text2);
  outline: none;
  width: 100%;
  height: 100%;
  caret-color: var(--text);
  transition: border-color 0.15s, color 0.15s;
  color-scheme: dark;
}

.cell-input:focus {
  border-color: var(--text3);
  color: var(--text);
}

.confirm-wrap {
  padding: 14px 20px 32px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.btn-confirm {
  width: 100%;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  padding: 15px;
  font-family: 'Geist', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}

.btn-confirm:active { opacity: 0.85; }
.btn-confirm:disabled { opacity: 0.15; cursor: not-allowed; }

.skeleton {
  flex: 1;
  background: var(--surface);
  border-radius: 8px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 100;
  text-align: center;
  padding: 24px;
}
.overlay.show { opacity: 1; pointer-events: all; }
.overlay-icon { font-size: 36px; }
.overlay-title { font-size: 18px; font-weight: 500; }

.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.cancel-btn {
  font-size: 13px;
  color: var(--text2);
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Geist', sans-serif;
  margin-top: 8px;
}
</style>
</head>
<body>

<div class="table-wrap">
  <div class="table-header">
    <span class="col-label">Persona o Categoría</span>
    <span class="col-label">Monto (ARS)</span>
  </div>
  <div class="rows-container" id="rows-container">
    <div class="row-item"><div class="skeleton"></div><div class="skeleton"></div></div>
    <div class="row-item"><div class="skeleton"></div><div class="skeleton"></div></div>
    <div class="row-item"><div class="skeleton"></div><div class="skeleton"></div></div>
    <div class="row-item"><div class="skeleton"></div><div class="skeleton"></div></div>
    <div class="row-item"><div class="skeleton"></div><div class="skeleton"></div></div>
    <div class="row-item"><div class="skeleton"></div><div class="skeleton"></div></div>
    <div class="row-item"><div class="skeleton"></div><div class="skeleton"></div></div>
    <div class="row-item"><div class="skeleton"></div><div class="skeleton"></div></div>
    <div class="row-item"><div class="skeleton"></div><div class="skeleton"></div></div>
    <div class="row-item"><div class="skeleton"></div><div class="skeleton"></div></div>
    <div class="row-item"><div class="skeleton"></div><div class="skeleton"></div></div>
  </div>
</div>

<div class="confirm-wrap">
  <button class="btn-confirm" id="btn-confirm" disabled>Registrar cambios</button>
</div>

<div class="overlay" id="ov-loading">
  <div class="spinner"></div>
  <span style="color:var(--text2);font-size:13px">Guardando...</span>
</div>

<div class="overlay" id="ov-ok">
  <span class="overlay-icon">✓</span>
  <span class="overlay-title">Guardado</span>
</div>

<div class="overlay" id="ov-error">
  <span class="overlay-icon">✕</span>
  <span class="overlay-title">Error</span>
  <span style="font-size:12px;color:var(--text2);font-family:'Geist Mono',monospace">No se pudo completar</span>
  <button class="cancel-btn" onclick="hideAll()">Volver</button>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIVeD1gCQba82X83v2bG1mJdCvLr3CLToXHxXZbhIiV6eYQCDR9llhdUZqbizGJSSG/exec";

const START_ROW = 3;
let rawData = [];
let formulasK = [];
let modifiedRows = new Set();

async function loadData() {
  try {
    const res  = await fetch(APPS_SCRIPT_URL + "?action=getCaja");
    const json = await res.json();
    if (json.status === "ok") {
      rawData   = json.valuesJ;
      formulasK = json.formulasK;
      renderRows();
    } else {
      showLoadError();
    }
  } catch { showLoadError(); }
}

function showLoadError() {
  document.getElementById("rows-container").innerHTML =
    `<span style="color:var(--text2);font-size:13px;font-family:'Geist Mono',monospace;padding:12px 0;display:block">No se pudo cargar la información</span>`;
}

function renderRows() {
  const container = document.getElementById("rows-container");
  container.innerHTML = "";

  rawData.forEach((valJ, i) => {
    const valK = formulasK[i] ?? "";

    const rowEl = document.createElement("div");
    rowEl.className = "row-item";

    // Usando input tipo texto
    const inputJ = document.createElement("input");
    inputJ.type = "text";
    inputJ.className = "cell-input";
    inputJ.value = valJ;
    inputJ.addEventListener("input", () => modifiedRows.add(i));

    const inputK = document.createElement("input");
    inputK.type = "text";
    inputK.className = "cell-input";
    inputK.value = valK;
    inputK.addEventListener("input", () => modifiedRows.add(i));

    rowEl.appendChild(inputJ);
    rowEl.appendChild(inputK);
    container.appendChild(rowEl);
  });

  document.getElementById("btn-confirm").disabled = false;
}

document.getElementById("btn-confirm").addEventListener("click", async () => {
  if (modifiedRows.size === 0) { window.close(); return; }

  const allRows = document.querySelectorAll(".row-item");
  const changes = [];

  modifiedRows.forEach(i => {
    const rowEl = allRows[i];
    if (!rowEl) return;
    const [inJ, inK] = rowEl.querySelectorAll(".cell-input");
    changes.push({
      row: START_ROW + i,
      j: inJ.value,
      k: inK.value
    });
  });

  showOverlay("ov-loading");
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      keepalive: true,
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action: "updateCajaPartial", changes })
    });
    hideAll();
    showOverlay("ov-ok");
    setTimeout(() => window.close(), 1500);
  } catch {
    hideAll();
    showOverlay("ov-error");
  }
});

function showOverlay(id) { hideAll(); document.getElementById(id).classList.add("show"); }
function hideAll() { document.querySelectorAll(".overlay").forEach(o => o.classList.remove("show")); }

// Fullscreen en móvil al tocar
document.addEventListener("click", () => {
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
}, { once: true });
loadData();
</script>
</body>
</html>
