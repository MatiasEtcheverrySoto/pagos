<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pago</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #111110;
  --surface: #1c1c1a;
  --surface2: #252523;
  --border: #2e2e2b;
  --text: #f0f0ee;
  --text2: #888880;
  --text3: #444440;
  --red: #e05c4b;
  --green: #4caf82;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ── TOP BAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 0;
}

.app-tag {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
}

.cancel-btn {
  font-size: 13px;
  color: var(--text2);
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Geist', sans-serif;
  padding: 4px 0;
}

/* ── DATES ── */
.dates-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 16px 20px 0;
}

.date-field {
  display: flex;
  flex-direction: column;
  gap: 5px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
}

.date-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
}

.date-input {
  background: none;
  border: none;
  outline: none;
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  color: var(--text);
  width: 100%;
  cursor: pointer;
}

.date-input::-webkit-calendar-picker-indicator {
  filter: invert(0.4);
  cursor: pointer;
  margin-left: -2px;
}

/* ── AMOUNT ── */
.amount-block { padding: 20px 20px 0; }

.amount-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.amount-left {
  display: flex;
  align-items: baseline;
  gap: 4px;
  flex: 1;
}

.amount-sign {
  font-family: 'Geist Mono', monospace;
  font-size: 26px;
  font-weight: 300;
  line-height: 1;
  transition: color 0.2s;
}

.amount-sign.neg { color: var(--red); }
.amount-sign.pos { color: var(--green); }

.amount-input {
  font-family: 'Geist Mono', monospace;
  font-size: 40px;
  font-weight: 300;
  color: var(--text);
  background: none;
  border: none;
  outline: none;
  width: 100%;
  caret-color: var(--text2);
  letter-spacing: -1px;
  min-width: 0;
}

.amount-input::placeholder { color: var(--text3); }

.toggle-btn {
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text2);
  white-space: nowrap;
}

.toggle-btn.gasto { color: var(--red); border-color: rgba(224,92,75,0.3); background: rgba(224,92,75,0.08); }
.toggle-btn.ingreso { color: var(--green); border-color: rgba(76,175,130,0.3); background: rgba(76,175,130,0.08); }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 18px 20px 0; }

/* ── SEARCH ── */
.search-wrap { padding: 14px 20px 0; }

.search-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  outline: none;
  font-family: 'Geist', sans-serif;
  font-size: 14px;
  color: var(--text);
  padding: 10px 14px;
  caret-color: var(--text2);
}

.search-input::placeholder { color: var(--text3); }

/* ── CATEGORIES ── */
.categories-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 12px 20px 0;
  -webkit-overflow-scrolling: touch;
}

.cat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.cat-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  width: 100%;
}

.cat-item:active { transform: scale(0.97); }

.cat-emoji { font-size: 16px; flex-shrink: 0; line-height: 1; }

.cat-name {
  font-size: 12px;
  font-weight: 400;
  color: var(--text2);
  transition: color 0.15s;
  line-height: 1.2;
}

.cat-item.selected {
  background: var(--surface2);
  border-color: var(--text3);
}

.cat-item.selected .cat-name { color: var(--text); font-weight: 500; }
.cat-item.hidden { display: none; }

/* ── CONFIRM ── */
.confirm-wrap {
  padding: 14px 20px 32px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  margin-top: 12px;
}

.btn-confirm {
  width: 100%;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  padding: 15px;
  font-family: 'Geist', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}

.btn-confirm:active { opacity: 0.85; }
.btn-confirm:disabled { opacity: 0.15; cursor: not-allowed; }

/* ── OVERLAYS ── */
.overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 100;
}

.overlay.show { opacity: 1; pointer-events: all; }
.overlay-icon { font-size: 36px; }
.overlay-title { font-size: 18px; font-weight: 500; color: var(--text); }
.overlay-sub { font-size: 12px; color: var(--text2); font-family: 'Geist Mono', monospace; }

.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <span class="app-tag" id="app-tag">—</span>
  <button class="cancel-btn" id="btn-cancel">Cancelar</button>
</div>

<!-- Fechas -->
<div class="dates-row">
  <div class="date-field">
    <span class="date-label">Fecha Resultado</span>
    <input class="date-input" type="date" id="fecha-resultado">
  </div>
  <div class="date-field">
    <span class="date-label">Fecha Caja</span>
    <input class="date-input" type="date" id="fecha-caja">
  </div>
</div>

<!-- Monto -->
<div class="amount-block">
  <div class="amount-row">
    <div class="amount-left">
      <span class="amount-sign neg" id="amount-sign">−</span>
      <input class="amount-input" id="monto-input" type="text" inputmode="decimal" placeholder="0,00">
    </div>
    <button class="toggle-btn gasto" id="toggle-btn">Gasto</button>
  </div>
</div>

<div class="divider"></div>

<div class="search-wrap">
  <input class="search-input" id="search-input" type="text" placeholder="Buscar categoría..." autocomplete="off" autocorrect="off" spellcheck="false">
</div>

<div class="categories-wrap">
  <div class="cat-grid" id="cat-grid"></div>
</div>

<div class="confirm-wrap">
  <button class="btn-confirm" id="btn-confirm" disabled>Registrar</button>
</div>

<div class="overlay" id="ov-loading"><div class="spinner"></div></div>

<div class="overlay" id="ov-ok">
  <span class="overlay-icon">✓</span>
  <span class="overlay-title">Registrado</span>
  <span class="overlay-sub" id="ok-detail"></span>
</div>

<div class="overlay" id="ov-error">
  <span class="overlay-icon">✕</span>
  <span class="overlay-title">Error</span>
  <span class="overlay-sub">No se pudo registrar</span>
  <button class="cancel-btn" style="margin-top:16px" onclick="hideAll()">Volver</button>
</div>

<script>
const APPS_SCRIPT_URL = "PEGA_AQUI_TU_URL_DEL_APPS_SCRIPT";

const CATS_GASTO = [
  ["🍽️","Comida"],["🚗","Transporte"],["🔧","Auto"],["⛽","Combustible"],
  ["💪","GYM"],["👕","Ropa"],["🎁","Cumples y Regalos"],["🛒","Compra"],
  ["🦷","Dentista"],["📱","Suscripción"],["🧴","Salud y aseo"],["🎉","Evento"],
  ["🎓","Facultad"],["📚","Educación"],["🅿️","Estacionamiento"],["📡","Datos"],
  ["✂️","Peluquería"],["💸","Propinas"],["🎲","Apuesta y Juego"],["🛡️","Seguro"],
  ["🏛️","Impuestos"],["❓","Desconocido"],["📦","Otros"]
];

const CATS_INGRESO = [
  ["💼","Sueldo Lucom"],["💰","Comisión Lucom"],["🎓","Clases"],["🏷️","Venta"],
  ["🎄","Aguinaldo Lucom"],["📈","Rendimientos"],["🎁","Cumples y Regalos"],
  ["🎲","Apuesta y Juego"],["❓","Desconocido"],["📦","Otros"]
];

// Params
const p = new URLSearchParams(window.location.search);
const montoParam = p.get("monto") || "";
const appParam   = (p.get("app") || "").toLowerCase();
const textoParam = p.get("texto") || "";
const signoParam = p.get("signo") || "negativo";

// State
let isGasto = signoParam !== "positivo";
let selected = null;

// Today's date in YYYY-MM-DD
function todayStr() {
  const d = new Date();
  return d.toISOString().split("T")[0];
}

function formatDateForSheet(dateStr) {
  // dateStr is YYYY-MM-DD, convert to DD/MM/YYYY
  const [y, m, d] = dateStr.split("-");
  return `${d}/${m}/${y}`;
}

// Init
document.getElementById("app-tag").textContent = appParam || "pago";
document.getElementById("monto-input").value = montoParam;
document.getElementById("fecha-resultado").value = todayStr();
document.getElementById("fecha-caja").value = todayStr();

// Toggle gasto/ingreso
const toggleBtn = document.getElementById("toggle-btn");
const signEl    = document.getElementById("amount-sign");

function updateToggle() {
  if (isGasto) {
    toggleBtn.textContent = "Gasto";
    toggleBtn.className = "toggle-btn gasto";
    signEl.textContent = "−";
    signEl.className = "amount-sign neg";
  } else {
    toggleBtn.textContent = "Ingreso";
    toggleBtn.className = "toggle-btn ingreso";
    signEl.textContent = "+";
    signEl.className = "amount-sign pos";
  }
  selected = null;
  document.getElementById("btn-confirm").disabled = true;
  document.getElementById("search-input").value = "";
  buildCats();
}

toggleBtn.addEventListener("click", () => {
  isGasto = !isGasto;
  updateToggle();
});

// Build categories
function buildCats() {
  const grid = document.getElementById("cat-grid");
  grid.innerHTML = "";
  const cats = isGasto ? CATS_GASTO : CATS_INGRESO;
  cats.forEach(([emoji, name]) => {
    const btn = document.createElement("button");
    btn.className = "cat-item";
    btn.dataset.name = name.toLowerCase();
    btn.innerHTML = `<span class="cat-emoji">${emoji}</span><span class="cat-name">${name}</span>`;
    btn.addEventListener("click", () => {
      document.querySelectorAll(".cat-item").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selected = name;
      document.getElementById("btn-confirm").disabled = false;
      btn.scrollIntoView({ behavior: "smooth", block: "nearest" });
    });
    grid.appendChild(btn);
  });
}

buildCats();
updateToggle();

// Search
document.getElementById("search-input").addEventListener("input", e => {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll(".cat-item").forEach(btn => {
    btn.classList.toggle("hidden", q.length > 0 && !btn.dataset.name.includes(q));
  });
});

// Confirm
document.getElementById("btn-confirm").addEventListener("click", async () => {
  if (!selected) return;
  const monto = document.getElementById("monto-input").value.trim();
  if (!monto) return;

  const montoFinal   = isGasto ? "-" + monto : monto;
  const fechaResultado = formatDateForSheet(document.getElementById("fecha-resultado").value);
  const fechaCaja      = formatDateForSheet(document.getElementById("fecha-caja").value);

  showOverlay("ov-loading");
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        monto: montoFinal,
        descripcion: textoParam,
        app: appParam,
        categoria: selected,
        yaConSigno: true,
        fechaResultado,
        fechaCaja
      })
    });
    const json = await res.json();
    hideAll();
    if (json.status === "ok" || json.status === "ignorado") {
      document.getElementById("ok-detail").textContent = `${montoFinal} · ${selected}`;
      showOverlay("ov-ok");
      setTimeout(() => window.close(), 2000);
    } else {
      showOverlay("ov-error");
    }
  } catch {
    hideAll();
    showOverlay("ov-error");
  }
});

document.getElementById("btn-cancel").addEventListener("click", () => window.close());

function showOverlay(id) { hideAll(); document.getElementById(id).classList.add("show"); }
function hideAll() { document.querySelectorAll(".overlay").forEach(o => o.classList.remove("show")); }
</script>
</body>
</html>
