<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Registrar pago</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --text-muted: #666;
    --text-dim: #999;
    --accent: #00e5a0;
    --accent-dim: rgba(0,229,160,0.12);
    --danger: #ff4d4d;
    --danger-dim: rgba(255,77,77,0.12);
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }
  .card { width: 100%; max-width: 420px; position: relative; z-index: 1; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .app-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 100px; padding: 4px 12px 4px 8px;
    margin-bottom: 20px; font-size: 11px; font-weight: 500;
    color: var(--text-dim); letter-spacing: 0.05em; text-transform: uppercase;
  }
  .app-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .monto-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px; margin-bottom: 12px;
    position: relative; overflow: hidden;
  }
  .monto-section::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.4;
  }
  .field-label { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .monto-input-wrap { display: flex; align-items: center; gap: 8px; }
  .monto-prefix { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; color: var(--text-muted); flex-shrink: 0; transition: color 0.2s; }
  .monto-negativo .monto-prefix { color: var(--danger); }
  .monto-positivo .monto-prefix { color: var(--accent); }
  #monto-input {
    background: transparent; border: none; outline: none;
    font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 500;
    color: var(--text); width: 100%; caret-color: var(--accent);
  }
  #monto-input::placeholder { color: var(--border); }

  .signo-toggle { display: flex; gap: 6px; margin-top: 14px; }
  .signo-btn {
    flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .signo-btn.active-neg { background: var(--danger-dim); border-color: var(--danger); color: var(--danger); }
  .signo-btn.active-pos { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .desc-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 16px;
    font-size: 12px; color: var(--text-muted); line-height: 1.5; word-break: break-word;
  }

  .section-label { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .categorias-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
  .cat-btn {
    padding: 10px 6px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--surface); color: var(--text-dim);
    font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer;
    transition: all 0.15s; text-align: center; display: flex;
    flex-direction: column; align-items: center; gap: 4px;
  }
  .cat-btn .cat-icon { font-size: 18px; }
  .cat-btn:active { transform: scale(0.96); }
  .cat-btn.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .actions { display: flex; gap: 10px; }
  .btn {
    flex: 1; padding: 15px; border-radius: var(--radius-sm); border: none;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-cancel { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); }
  .btn-confirm { background: var(--accent); color: #000; font-weight: 600; }

  .estado { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 220px; gap: 16px; }
  .estado.visible { display: flex; }
  .estado-icon { font-size: 48px; }
  .estado-titulo { font-size: 18px; font-weight: 600; }
  .estado-sub { font-size: 13px; color: var(--text-muted); max-width: 260px; line-height: 1.5; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #form-view { display: block; }
</style>
</head>
<body>
<div class="card">

  <div id="form-view">
    <div class="app-badge">
      <div class="app-dot"></div>
      <span id="app-name">Pago</span>
    </div>

    <div class="monto-section" id="monto-section">
      <div class="field-label">Monto</div>
      <div class="monto-input-wrap">
        <span class="monto-prefix" id="signo-display">−</span>
        <input type="text" id="monto-input" inputmode="decimal" placeholder="0,00">
      </div>
      <div class="signo-toggle">
        <button class="signo-btn active-neg" id="btn-negativo" onclick="setSigNo(-1)">− Egreso</button>
        <button class="signo-btn" id="btn-positivo" onclick="setSigNo(1)">+ Ingreso</button>
      </div>
    </div>

    <div class="desc-box" id="desc-box"></div>

    <div class="section-label">Categoría</div>
    <div class="categorias-grid" id="categorias-grid"></div>

    <div class="actions">
      <button class="btn btn-cancel" onclick="cancelar()">Cancelar</button>
      <button class="btn btn-confirm" onclick="confirmar()">Confirmar</button>
    </div>
  </div>

  <div class="estado" id="loading-view">
    <div class="spinner"></div>
    <div class="estado-titulo">Guardando...</div>
  </div>

  <div class="estado" id="ok-view">
    <div class="estado-icon">✅</div>
    <div class="estado-titulo">¡Registrado!</div>
    <div class="estado-sub" id="ok-msg">El pago fue guardado en el Sheet.</div>
  </div>

  <div class="estado" id="error-view">
    <div class="estado-icon">⚠️</div>
    <div class="estado-titulo">Error al guardar</div>
    <div class="estado-sub" id="error-msg">No se pudo conectar.</div>
    <button class="btn btn-confirm" style="max-width:200px;margin-top:8px" onclick="mostrar('form-view')">Reintentar</button>
  </div>

</div>

<script>
  // ══════════════════════════════════════════
  // REEMPLAZÁ ESTO CON TU URL DE APPS SCRIPT
  const APPS_SCRIPT_URL = "REEMPLAZAR_CON_TU_URL";
  // ══════════════════════════════════════════

  const CATEGORIAS = [
    { id: "comida",          label: "Comida",      icon: "🍔" },
    { id: "supermercado",    label: "Super",       icon: "🛒" },
    { id: "transporte",      label: "Transporte",  icon: "🚗" },
    { id: "salud",           label: "Salud",       icon: "💊" },
    { id: "servicios",       label: "Servicios",   icon: "💡" },
    { id: "entretenimiento", label: "Entrete.",    icon: "🎬" },
    { id: "ropa",            label: "Ropa",        icon: "👕" },
    { id: "ahorro",          label: "Ahorro",      icon: "💰" },
    { id: "otro",            label: "Otro",        icon: "📌" },
  ];

  let signo = -1;
  let categoriaSeleccionada = null;
  let params = {};

  function init() {
    const p = new URLSearchParams(window.location.search);
    params = { texto: p.get("texto") || "", app: p.get("app") || "" };

    const appNames = { carrefour: "Carrefour Banco", uala: "Ualá" };
    document.getElementById("app-name").textContent = appNames[params.app] || params.app || "Pago";

    const descBox = document.getElementById("desc-box");
    if (params.texto) {
      descBox.textContent = params.texto;
    } else {
      descBox.style.display = "none";
    }

    // Extraer monto de la notificación
    const match = params.texto.match(/\$\s*([\d.,]+)/);
    if (match) document.getElementById("monto-input").value = match[1];

    // Signo inicial según tipo de notificación
    const esIngreso = params.texto.toLowerCase().includes("recibiste");
    setSigNo(esIngreso ? 1 : -1);

    // Renderizar categorías
    const grid = document.getElementById("categorias-grid");
    CATEGORIAS.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "cat-btn";
      btn.innerHTML = `<span class="cat-icon">${cat.icon}</span>${cat.label}`;
      btn.onclick = () => {
        categoriaSeleccionada = cat.id;
        document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
      };
      grid.appendChild(btn);
    });
  }

  function setSigNo(s) {
    signo = s;
    const section = document.getElementById("monto-section");
    section.classList.toggle("monto-negativo", s === -1);
    section.classList.toggle("monto-positivo", s === 1);
    document.getElementById("signo-display").textContent = s === -1 ? "−" : "+";
    document.getElementById("btn-negativo").className = "signo-btn" + (s === -1 ? " active-neg" : "");
    document.getElementById("btn-positivo").className = "signo-btn" + (s === 1  ? " active-pos" : "");
  }

  function mostrar(view) {
    ["form-view","loading-view","ok-view","error-view"].forEach(id => {
      const el = document.getElementById(id);
      el.style.display = "none";
      el.classList.remove("visible");
    });
    const target = document.getElementById(view);
    target.style.display = view === "form-view" ? "block" : "flex";
    if (view !== "form-view") target.classList.add("visible");
  }

  function cancelar() {
    window.close();
    setTimeout(() => {
      document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100dvh;font-family:sans-serif;color:#666;font-size:14px;background:#0f0f0f">Podés cerrar esta ventana.</div>`;
    }, 200);
  }

  async function confirmar() {
    const montoRaw = document.getElementById("monto-input").value.trim();
    if (!montoRaw) { document.getElementById("monto-input").focus(); return; }

    const montoFinal = (signo === -1 ? "-" : "") + montoRaw;
    const categoria = categoriaSeleccionada || "A confirmar";

    mostrar("loading-view");

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          monto: montoFinal,
          descripcion: params.texto,
          app: params.app,
          categoria: categoria,
          desde_web: true
        })
      });

      const json = await res.json();
      if (json.status === "ok" || json.status === "ignorado") {
        const catLabel = CATEGORIAS.find(c => c.id === categoriaSeleccionada)?.label || "A confirmar";
        document.getElementById("ok-msg").textContent = `Guardado como "${catLabel}"`;
        mostrar("ok-view");
        setTimeout(() => window.close(), 2500);
      } else {
        throw new Error(json.msg || "Error del servidor");
      }
    } catch(err) {
      document.getElementById("error-msg").textContent = err.message;
      mostrar("error-view");
    }
  }

  init();
</script>
</body>
</html>
