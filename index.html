<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pago</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* Estilos generales y variables de color existentes */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #111110;
  --surface: #1c1c1a;
  --surface2: #252523;
  --border: #2e2e2b;
  --text: #f0f0ee;
  --text2: #888880;
  --text3: #444440;
  --red: #e05c4b;
  --green: #4caf82;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* Estilos de la app principal (se mantienen) */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 0;
}

.app-tag {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
}

.cancel-btn {
  font-size: 13px;
  color: var(--text2);
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Geist', sans-serif;
  padding: 4px 0;
}

.dates-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 16px 20px 0;
}

.date-field {
  display: flex;
  flex-direction: column;
  gap: 5px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
}

.date-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
}

.date-input {
  background: none;
  border: none;
  outline: none;
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  color: var(--text);
  width: 100%;
  cursor: pointer;
  color-scheme: dark;
}

.amount-block { padding: 20px 20px 0; }

.amount-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.amount-left {
  display: flex;
  align-items: baseline;
  gap: 4px;
  flex: 1;
  min-width: 0;
}

.amount-sign {
  font-family: 'Geist Mono', monospace;
  font-size: 26px;
  font-weight: 300;
  line-height: 1;
  flex-shrink: 0;
  transition: color 0.2s;
}

.amount-sign.neg { color: var(--red); }
.amount-sign.pos { color: var(--green); }

.amount-input {
  font-family: 'Geist Mono', monospace;
  font-size: 40px;
  font-weight: 300;
  color: var(--text);
  background: none;
  border: none;
  outline: none;
  width: 100%;
  caret-color: var(--text2);
  letter-spacing: -1px;
  min-width: 0;
}

.amount-input::placeholder { color: var(--text3); }

.toggle-btn {
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text2);
  white-space: nowrap;
}

.toggle-btn.gasto  { color: var(--red);   border-color: rgba(224,92,75,0.3);   background: rgba(224,92,75,0.08); }
.toggle-btn.ingreso{ color: var(--green); border-color: rgba(76,175,130,0.3); background: rgba(76,175,130,0.08); }

.divider { height: 1px; background: var(--border); margin: 18px 20px 0; }

.search-wrap { padding: 14px 20px 0; }

.search-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  outline: none;
  font-family: 'Geist', sans-serif;
  font-size: 14px;
  color: var(--text);
  padding: 10px 14px;
  caret-color: var(--text2);
}

.search-input::placeholder { color: var(--text3); }

.categories-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 12px 20px 0;
  -webkit-overflow-scrolling: touch;
}

.cat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.cat-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  width: 100%;
}

.cat-item:active { transform: scale(0.97); }

.cat-emoji { font-size: 16px; flex-shrink: 0; line-height: 1; }

.cat-name {
  font-size: 12px;
  font-weight: 400;
  color: var(--text2);
  transition: color 0.15s;
  line-height: 1.2;
}

.cat-item.selected { background: var(--surface2); border-color: var(--text3); }
.cat-item.selected .cat-name { color: var(--text); font-weight: 500; }
.cat-item.hidden { display: none; }

.confirm-wrap {
  padding: 14px 20px 32px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  margin-top: 12px;
}

.btn-confirm {
  width: 100%;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  padding: 15px;
  font-family: 'Geist', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}

.btn-confirm:active { opacity: 0.85; }
.btn-confirm:disabled { opacity: 0.15; cursor: not-allowed; }

/* Estilos de Overlays existentes (reemplazados para #ov-loading) */
.overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 100;
}

.overlay.show { opacity: 1; pointer-events: all; }
.overlay-icon { font-size: 36px; }
.overlay-title { font-size: 18px; font-weight: 500; color: var(--text); }
.overlay-sub { font-size: 12px; color: var(--text2); font-family: 'Geist Mono', monospace; }

/* NUEVOS ESTILOS PARA LA PANTALLA DE CARGA (#ov-loading) */
#ov-loading {
  background: var(--bg);
  flex-direction: column;
  align-items: center;
  justify-content: space-around; /* Distribuir secciones verticalmente */
  padding: 40px 20px;
}

/* Fila de Fechas reflejadas */
.echo-dates-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  width: 100%;
  margin-bottom: 30px;
}

.echo-date-field {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Etiquetas de fecha (en los círculos celestes de la imagen) */
.echo-date-label {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* Rectángulo oscuro de valor de fecha */
.echo-date-value-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 15px 20px;
  text-align: center;
  width: 100%;
}

/* Fecha real (centrada y más grande) */
.echo-date-value {
  font-family: 'Geist Mono', monospace;
  font-size: 16px;
  color: var(--text);
}

/* Contenedores de Monto y Categoría reflejados */
.echo-section-container {
  width: 100%;
  margin-bottom: 25px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

/* Etiquetas de sección (Monto, Categoría - Más grandes) */
.echo-section-label {
  font-family: 'Geist', sans-serif;
  font-size: 11px; /* Aumentado */
  color: var(--text2);
  margin-bottom: 8px;
  text-transform: capitalize;
}

/* Estilos de valor de Monto y Categoría (Más grandes) */
.echo-amount-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.echo-amount-sign {
  font-family: 'Geist Mono', monospace;
  font-size: 32px; /* Se mantiene grande */
  font-weight: 300;
  color: var(--red); /* Por defecto neg, JS lo cambia */
}

.echo-amount-input {
  font-family: 'Geist Mono', monospace;
  font-size: 40px; /* Se mantiene grande */
  font-weight: 300;
  color: var(--text);
  letter-spacing: -1px;
}

.echo-cat-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 15px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: auto;
}

.echo-cat-emoji { font-size: 20px; } /* Aumentado */
.echo-cat-name {
  font-size: 16px; /* Aumentado */
  color: var(--text);
}

/* Controles de Carga */
.loading-status {
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
  color: var(--text2);
  margin-top: 30px;
  text-transform: uppercase;
}

/* Barra de progreso de la imagen de referencia */
.progress-container {
  width: 80%;
  height: 10px;
  background: var(--surface2);
  border-radius: 6px;
  overflow: hidden;
  margin-top: 10px;
}

.progress-ribbing {
  height: 100%;
  width: 50%; /* JS actualiza esto, o es una animación de "espera" */
  background-color: var(--green);
  background-image: repeating-linear-gradient(
    -45deg,
    rgba(0, 0, 0, 0.1) 25%,
    transparent 25%,
    transparent 50%,
    rgba(0, 0, 0, 0.1) 50%,
    rgba(0, 0, 0, 0.1) 75%,
    transparent 75%,
    transparent
  );
  background-size: 20px 20px;
  animation: moveRibbing 1s linear infinite;
}

@keyframes moveRibbing {
  0% { background-position: 0 0; }
  100% { background-position: 20px 0; }
}
</style>
</head>
<body>

<div class="topbar">
  <span class="app-tag" id="app-tag">—</span>
  <button class="cancel-btn" id="btn-cancel">Cancelar</button>
</div>

<div class="dates-row">
  <div class="date-field">
    <span class="date-label">Fecha Resultado</span>
    <input class="date-input" type="date" id="fecha-resultado">
  </div>
  <div class="date-field">
    <span class="date-label">Fecha Caja</span>
    <input class="date-input" type="date" id="fecha-caja">
  </div>
</div>

<div class="amount-block">
  <div class="amount-row">
    <div class="amount-left">
      <span class="amount-sign neg" id="amount-sign">−</span>
      <input class="amount-input" id="monto-input" type="text" inputmode="decimal" placeholder="0,00">
    </div>
    <button class="toggle-btn gasto" id="toggle-btn">Gasto</button>
  </div>
</div>

<div class="divider"></div>

<div class="search-wrap">
  <input class="search-input" id="search-input" type="text" placeholder="Buscar categoría..." autocomplete="off" autocorrect="off" spellcheck="false">
</div>

<div class="categories-wrap">
  <div class="cat-grid" id="cat-grid"></div>
</div>

<div class="confirm-wrap">
  <button class="btn-confirm" id="btn-confirm" disabled>Registrar</button>
</div>

<div class="overlay" id="ov-loading">
  <div class="echo-dates-row">
    <div class="echo-date-field">
      <span class="echo-date-label">FECHA CAJA</span>
      <div class="echo-date-value-container">
        <span id="echo-date-caja-val" class="echo-date-value">--/--/----</span>
      </div>
    </div>
    <div class="echo-date-field">
      <span class="echo-date-label">FECHA RESULTADO</span>
      <div class="echo-date-value-container">
        <span id="echo-date-rdo-val" class="echo-date-value">--/--/----</span>
      </div>
    </div>
  </div>

  <div class="echo-section-container">
    <span class="echo-section-label">Monto</span>
    <div class="echo-amount-row">
      <span id="echo-amount-sign" class="echo-amount-sign neg">−</span>
      <span id="echo-amount-val" class="echo-amount-input">0,00</span>
    </div>
  </div>

  <div class="echo-section-container">
    <span class="echo-section-label">Categoría</span>
    <div class="echo-cat-item">
      <span id="echo-cat-emoji" class="echo-cat-emoji">❓</span>
      <span id="echo-cat-name" class="echo-cat-name">Seleccione una categoría</span>
    </div>
  </div>

  <div class="loading-status">CARGANDO...</div>
  <div class="progress-container">
    <div class="progress-ribbing" id="progress-bar"></div>
  </div>
</div>

<div class="overlay" id="ov-ok">
  <span class="overlay-icon">✓</span>
  <span class="overlay-title">Registrado</span>
  <span class="overlay-sub" id="ok-detail"></span>
</div>

<div class="overlay" id="ov-error">
  <span class="overlay-icon">✕</span>
  <span class="overlay-title">Error</span>
  <span class="overlay-sub">No se pudo registrar</span>
  <button class="cancel-btn" style="margin-top:16px" onclick="hideAll()">Volver</button>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIVeD1gCQba82X83v2bG1mJdCvLr3CLToXHxXZbhIiV6eYQCDR9llhdUZqbizGJSSG/exec";

// Categorías (revisadas para incluir "A confirmar" y "Otros")
const CATS_GASTO = [
  ["🍽️","Comida"],["🚗","Transporte"],["🔧","Auto"],["⛽","Combustible"],
  ["💪","GYM"],["👕","Ropa"],["🎁","Cumples y Regalos"],["🛒","Compra"],
  ["🦷","Dentista"],["📱","Suscripción"],["🧴","Salud y aseo"],["🎉","Evento"],
  ["🎓","Facultad"],["📚","Educación"],["🅿️","Estacionamiento"],["📡","Datos"],
  ["✂️","Peluquería"],["💸","Propinas"],["⏳","A confirmar"],["📦","Otros"]
];

const CATS_INGRESO = [
  ["💼","Sueldo Lucom"],["💰","Comisión Lucom"],["🎓","Clases"],["🏷️","Venta"],
  ["🎄","Aguinaldo Lucom"],["📈","Rendimientos"],["🎁","Cumples y Regalos"],
  ["🎲","Apuesta y Juego"],["⏳","A confirmar"],["📦","Otros"]
];

// Leer params
const p        = new URLSearchParams(window.location.search);
const textoParam = decodeURIComponent(p.get("texto") || "");
const appParam   = (p.get("app") || "").toLowerCase();
const signoParam = p.get("signo") || "negativo";

// Extraer monto del texto de la notificación
function extraerMonto(texto) {
  const match = texto.match(/\$\s*([\d.,]+)/);
  if (!match) return "";
  return match[1];
}

// Fecha de hoy en formato YYYY-MM-DD
function todayStr() {
  return new Date().toISOString().split("T")[0];
}

function formatDateForSheet(dateStr) {
  const [y, m, d] = dateStr.split("-");
  return `${d}/${m}/${y}`;
}

// State
let isGasto = signoParam !== "positivo";
let selected = null;

// Init UI
document.getElementById("app-tag").textContent = appParam || "pago";
document.getElementById("monto-input").value = extraerMonto(textoParam);
document.getElementById("fecha-resultado").value = todayStr();
document.getElementById("fecha-caja").value = todayStr();

const toggleBtn = document.getElementById("toggle-btn");
const signEl    = document.getElementById("amount-sign");

function updateToggle() {
  if (isGasto) {
    toggleBtn.textContent = "Gasto";
    toggleBtn.className = "toggle-btn gasto";
    signEl.textContent = "−";
    signEl.className = "amount-sign neg";
  } else {
    toggleBtn.textContent = "Ingreso";
    toggleBtn.className = "toggle-btn ingreso";
    signEl.textContent = "+";
    signEl.className = "amount-sign pos";
  }
  selected = null;
  document.getElementById("btn-confirm").disabled = true;
  document.getElementById("search-input").value = "";
  buildCats();
}

toggleBtn.addEventListener("click", () => { isGasto = !isGasto; updateToggle(); });

function buildCats() {
  const grid = document.getElementById("cat-grid");
  grid.innerHTML = "";
  const cats = isGasto ? CATS_GASTO : CATS_INGRESO;
  cats.forEach(([emoji, name]) => {
    const btn = document.createElement("button");
    btn.className = "cat-item";
    btn.dataset.name = name.toLowerCase();
    btn.innerHTML = `<span class="cat-emoji">${emoji}</span><span class="cat-name">${name}</span>`;
    btn.addEventListener("click", () => {
      document.querySelectorAll(".cat-item").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selected = name;
      document.getElementById("btn-confirm").disabled = false;
      btn.scrollIntoView({ behavior: "smooth", block: "nearest" });
    });
    grid.appendChild(btn);
  });
}

buildCats();
updateToggle();

// Search
document.getElementById("search-input").addEventListener("input", e => {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll(".cat-item").forEach(btn => {
    btn.classList.toggle("hidden", q.length > 0 && !btn.dataset.name.includes(q));
  });
});

// Confirm
document.getElementById("btn-confirm").addEventListener("click", async () => {
  if (!selected) return;
  const montoInput = document.getElementById("monto-input").value.trim();
  if (!montoInput) return;

  const montoFinal = isGasto ? "-" + montoInput : montoInput;
  const fechaResultadoInput = document.getElementById("fecha-resultado").value;
  const fechaCajaInput      = document.getElementById("fecha-caja").value;

  // Llenar campos de eco de la pantalla de carga
  document.getElementById("echo-date-caja-val").textContent = fechaCajaInput.split("-").reverse().join("/"); // Formato DD/MM/YYYY
  document.getElementById("echo-date-rdo-val").textContent = fechaResultadoInput.split("-").reverse().join("/");

  const signEl = document.getElementById("amount-sign");
  const echoSignEl = document.getElementById("echo-amount-sign");
  echoSignEl.textContent = signEl.textContent;
  echoSignEl.className = signEl.className; // Copiar clases neg/pos
  
  document.getElementById("echo-amount-val").textContent = montoInput;

  const currentCats = isGasto ? CATS_GASTO : CATS_INGRESO;
  const catObj = currentCats.find(c => c[1] === selected);
  document.getElementById("echo-cat-emoji").textContent = catObj ? catObj[0] : '❓';
  document.getElementById("echo-cat-name").textContent = selected;

  showOverlay("ov-loading");
  
  try {
    // LLAMADA AL SERVIDOR BLINDADA (Keepalive para segundo plano)
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      keepalive: true,
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        monto: montoFinal,
        descripcion: textoParam,
        app: appParam,
        categoria: selected,
        yaConSigno: true,
        fechaResultado: formatDateForSheet(fechaResultadoInput),
        fechaCaja: formatDateForSheet(fechaCajaInput)
      })
    });
    
    // Cierre Automático (Mínimo tiempo visual)
    setTimeout(() => window.close(), 150);
  } catch {
    hideAll();
    showOverlay("ov-error");
  }
});

document.getElementById("btn-cancel").addEventListener("click", () => window.close());

function showOverlay(id) { hideAll(); document.getElementById(id).classList.add("show"); }
function hideAll() { document.querySelectorAll(".overlay").forEach(o => o.classList.remove("show")); }
</script>
</body>
</html>
