<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pago</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* =========================================
   VARIABLES & RESET
   ========================================= */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #111110;
  --surface: #1c1c1a;
  --surface2: #252523;
  --border: #2e2e2b;
  --text: #f0f0ee;
  --text2: #888880;
  --text3: #444440;
  --red: #e05c4b;
  --green: #4caf82;
  /* Nuevo gradiente vibrante para la barra */
  --bar-gradient: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* =========================================
   UI PRINCIPAL
   ========================================= */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 0;
}

.app-tag {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
}

.cancel-btn {
  font-size: 13px;
  color: var(--text2);
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Geist', sans-serif;
  padding: 4px 0;
}

.dates-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 16px 20px 0;
}

.date-field {
  display: flex;
  flex-direction: column;
  gap: 5px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
}

.date-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
}

.date-input {
  background: none;
  border: none;
  outline: none;
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  color: var(--text);
  width: 100%;
  cursor: pointer;
  color-scheme: dark;
}

.amount-block { padding: 20px 20px 0; }

.amount-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.amount-left {
  display: flex;
  align-items: baseline;
  gap: 4px;
  flex: 1;
  min-width: 0;
}

.amount-sign {
  font-family: 'Geist Mono', monospace;
  font-size: 26px;
  font-weight: 300;
  line-height: 1;
  flex-shrink: 0;
  transition: color 0.2s;
}

.amount-sign.neg { color: var(--red); }
.amount-sign.pos { color: var(--green); }

.amount-input {
  font-family: 'Geist Mono', monospace;
  font-size: 40px;
  font-weight: 300;
  color: var(--text);
  background: none;
  border: none;
  outline: none;
  width: 100%;
  caret-color: var(--text2);
  letter-spacing: -1px;
  min-width: 0;
}

.amount-input::placeholder { color: var(--text3); }

.toggle-btn {
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text2);
  white-space: nowrap;
}

.toggle-btn.gasto  { color: var(--red);   border-color: rgba(224,92,75,0.3);   background: rgba(224,92,75,0.08); }
.toggle-btn.ingreso{ color: var(--green); border-color: rgba(76,175,130,0.3); background: rgba(76,175,130,0.08); }

.divider { height: 1px; background: var(--border); margin: 18px 20px 0; }

.search-wrap { padding: 14px 20px 0; }

.search-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  outline: none;
  font-family: 'Geist', sans-serif;
  font-size: 14px;
  color: var(--text);
  padding: 10px 14px;
  caret-color: var(--text2);
}

.search-input::placeholder { color: var(--text3); }

.categories-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 12px 20px 0;
  -webkit-overflow-scrolling: touch;
}

.cat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.cat-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  width: 100%;
}

.cat-item:active { transform: scale(0.97); }

.cat-emoji { font-size: 16px; flex-shrink: 0; line-height: 1; }

.cat-name {
  font-size: 12px;
  font-weight: 400;
  color: var(--text2);
  transition: color 0.15s;
  line-height: 1.2;
}

.cat-item.selected { background: var(--surface2); border-color: var(--text3); }
.cat-item.selected .cat-name { color: var(--text); font-weight: 500; }
.cat-item.hidden { display: none; }

.confirm-wrap {
  padding: 14px 20px 32px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  margin-top: 12px;
}

.btn-confirm {
  width: 100%;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  padding: 15px;
  font-family: 'Geist', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}

.btn-confirm:active { opacity: 0.85; }
.btn-confirm:disabled { opacity: 0.15; cursor: not-allowed; }

/* =========================================
   OVERLAY DE CARGA (NUEVO UX)
   ========================================= */
.overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 100;
}

.overlay.show { opacity: 1; pointer-events: all; }

.loading-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  width: 85%;
  max-width: 340px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* Caja de Resumen de Datos */
.summary-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.sum-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
}

.sum-label {
  color: var(--text3);
  letter-spacing: 0.05em;
}

.sum-val {
  color: var(--text);
  font-weight: 500;
  text-align: right;
}

/* Textos Dinámicos de Estado */
.status-text {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 12px;
  font-weight: 500;
  text-align: center;
  height: 16px; /* Evita saltos de layout */
  transition: color 0.3s;
}

/* Barra de Progreso Avanzada */
.progress-wrapper {
  position: relative;
  width: 100%;
  height: 12px;
  background: var(--bg);
  border-radius: 6px;
  overflow: hidden;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
}

.progress-bar {
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 0%;
  background: var(--bar-gradient);
  border-radius: 6px;
  overflow: hidden;
  /* Transición por defecto suave, se altera en JS para el impulso inicial */
  transition: width 0.2s linear, background-color 0.4s ease;
}

/* Estado de Éxito en la barra */
.progress-bar.success-state {
  background: var(--green);
}

/* Ilusión óptica 1: Rayas en reversa */
.progress-stripes {
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    45deg,
    rgba(255, 255, 255, 0.15) 0,
    rgba(255, 255, 255, 0.15) 12px,
    transparent 12px,
    transparent 24px
  );
  background-size: 34px 34px;
  animation: moveStripesReverse 0.8s linear infinite reverse;
}

/* Ocultar rayas al terminar */
.progress-bar.success-state .progress-stripes {
  opacity: 0;
  transition: opacity 0.3s;
}

/* Ilusión óptica 2: Brillo pulsante */
.progress-shimmer {
  position: absolute;
  top: 0; left: 0; bottom: 0; width: 60%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
  transform: skewX(-20deg) translateX(-150%);
  animation: shimmer 1.8s infinite;
}

/* Animación Inline de Checkmark (Celebración) */
.success-celebration {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 16px;
  height: 24px;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.success-celebration.show {
  opacity: 1;
  transform: translateY(0);
}

.success-celebration span {
  color: var(--green);
  font-weight: 600;
  font-size: 15px;
}

.inline-check {
  width: 22px; height: 22px;
  stroke: var(--green);
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
  stroke-dasharray: 24;
  stroke-dashoffset: 24;
}

.success-celebration.show .inline-check {
  animation: drawCheck 0.4s ease forwards 0.2s;
}

@keyframes moveStripesReverse {
  0% { background-position: 0 0; }
  100% { background-position: 34px 0; }
}

@keyframes shimmer {
  100% { transform: skewX(-20deg) translateX(250%); }
}

@keyframes drawCheck {
  to { stroke-dashoffset: 0; }
}

/* Pantalla Error Simple */
#ov-error { flex-direction: column; gap: 12px; }
.error-icon { font-size: 36px; }
.error-title { font-size: 18px; font-weight: 500; }
</style>
</head>
<body>

<div class="topbar">
  <span class="app-tag" id="app-tag">—</span>
  <button class="cancel-btn" id="btn-cancel">Cancelar</button>
</div>

<div class="dates-row">
  <div class="date-field">
    <span class="date-label">Fecha Caja</span>
    <input class="date-input" type="date" id="fecha-caja">
  </div>
  <div class="date-field">
    <span class="date-label">Fecha Resultado</span>
    <input class="date-input" type="date" id="fecha-resultado">
  </div>
</div>

<div class="amount-block">
  <div class="amount-row">
    <div class="amount-left">
      <span class="amount-sign neg" id="amount-sign">−</span>
      <input class="amount-input" id="monto-input" type="text" inputmode="decimal" placeholder="0,00">
    </div>
    <button class="toggle-btn gasto" id="toggle-btn">Gasto</button>
  </div>
</div>

<div class="divider"></div>

<div class="search-wrap">
  <input class="search-input" id="search-input" type="text" placeholder="Buscar categoría..." autocomplete="off" autocorrect="off" spellcheck="false">
</div>

<div class="categories-wrap">
  <div class="cat-grid" id="cat-grid"></div>
</div>

<div class="confirm-wrap">
  <button class="btn-confirm" id="btn-confirm" disabled>Registrar</button>
</div>

<div class="overlay" id="ov-loading">
  <div class="loading-card">
    
    <div class="summary-box">
      <div class="sum-row"><span class="sum-label">FECHA CAJA</span><span class="sum-val" id="sum-caja"></span></div>
      <div class="sum-row"><span class="sum-label">FECHA RDO.</span><span class="sum-val" id="sum-rdo"></span></div>
      <div class="sum-row"><span class="sum-label">MONTO</span><span class="sum-val" id="sum-monto"></span></div>
      <div class="sum-row"><span class="sum-label">CATEGORÍA</span><span class="sum-val" id="sum-cat"></span></div>
    </div>

    <div class="status-text" id="status-text">Cargando...</div>
    
    <div class="progress-wrapper">
      <div class="progress-bar" id="progress-bar">
        <div class="progress-stripes"></div>
        <div class="progress-shimmer"></div>
      </div>
    </div>

    <div class="success-celebration" id="success-celebration">
      <svg class="inline-check" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
      <span>Registrado correctamente</span>
    </div>

  </div>
</div>

<div class="overlay" id="ov-error">
  <span class="error-icon">✕</span>
  <span class="error-title">Error</span>
  <span class="sum-label">No se pudo registrar</span>
  <button class="cancel-btn" style="margin-top:16px" onclick="hideAll()">Volver</button>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIVeD1gCQba82X83v2bG1mJdCvLr3CLToXHxXZbhIiV6eYQCDR9llhdUZqbizGJSSG/exec";

const CATS_GASTO = [
  ["🍽️","Comida"],["🚗","Transporte"],["🔧","Auto"],["⛽","Combustible"],
  ["💪","GYM"],["👕","Ropa"],["🎁","Cumples y Regalos"],["🛒","Compra"],
  ["🦷","Dentista"],["📱","Suscripción"],["🧴","Salud y aseo"],["🎉","Evento"],
  ["🎓","Facultad"],["📚","Educación"],["🅿️","Estacionamiento"],["📡","Datos"],
  ["✂️","Peluquería"],["💸","Propinas"],["🎲","Apuesta y Juego"],["🛡️","Seguro"],
  ["🏛️","Impuestos"],["❓","Desconocido"],["📦","Otros"]
];

const CATS_INGRESO = [
  ["💼","Sueldo Lucom"],["💰","Comisión Lucom"],["🎓","Clases"],["🏷️","Venta"],
  ["🎄","Aguinaldo Lucom"],["📈","Rendimientos"],["🎁","Cumples y Regalos"],
  ["🎲","Apuesta y Juego"],["❓","Desconocido"],["📦","Otros"]
];

// Leer params
const p        = new URLSearchParams(window.location.search);
const textoParam = decodeURIComponent(p.get("texto") || "");
const appParam   = (p.get("app") || "").toLowerCase();
const signoParam = p.get("signo") || "negativo";

function extraerMonto(texto) {
  const match = texto.match(/\$\s*([\d.,]+)/);
  if (!match) return "";
  return match[1];
}

function todayStr() {
  return new Date().toISOString().split("T")[0];
}

function formatDateForSheet(dateStr) {
  const [y, m, d] = dateStr.split("-");
  return `${d}/${m}/${y}`;
}

// State
let isGasto = signoParam !== "positivo";
let selected = null;

// Init UI
document.getElementById("app-tag").textContent = appParam || "pago";
document.getElementById("monto-input").value = extraerMonto(textoParam);
document.getElementById("fecha-resultado").value = todayStr();
document.getElementById("fecha-caja").value = todayStr();

const toggleBtn = document.getElementById("toggle-btn");
const signEl    = document.getElementById("amount-sign");

function updateToggle() {
  if (isGasto) {
    toggleBtn.textContent = "Gasto";
    toggleBtn.className = "toggle-btn gasto";
    signEl.textContent = "−";
    signEl.className = "amount-sign neg";
  } else {
    toggleBtn.textContent = "Ingreso";
    toggleBtn.className = "toggle-btn ingreso";
    signEl.textContent = "+";
    signEl.className = "amount-sign pos";
  }
  selected = null;
  document.getElementById("btn-confirm").disabled = true;
  document.getElementById("search-input").value = "";
  buildCats();
}

toggleBtn.addEventListener("click", () => { isGasto = !isGasto; updateToggle(); });

function buildCats() {
  const grid = document.getElementById("cat-grid");
  grid.innerHTML = "";
  const cats = isGasto ? CATS_GASTO : CATS_INGRESO;
  cats.forEach(([emoji, name]) => {
    const btn = document.createElement("button");
    btn.className = "cat-item";
    btn.dataset.name = name.toLowerCase();
    btn.innerHTML = `<span class="cat-emoji">${emoji}</span><span class="cat-name">${name}</span>`;
    btn.addEventListener("click", () => {
      document.querySelectorAll(".cat-item").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selected = name;
      document.getElementById("btn-confirm").disabled = false;
      btn.scrollIntoView({ behavior: "smooth", block: "nearest" });
    });
    grid.appendChild(btn);
  });
}

buildCats();
updateToggle();

document.getElementById("search-input").addEventListener("input", e => {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll(".cat-item").forEach(btn => {
    btn.classList.toggle("hidden", q.length > 0 && !btn.dataset.name.includes(q));
  });
});

// LOGICA DE CONFIRMACIÓN Y ANIMACIONES
let stepsTimeout, creepInterval;

document.getElementById("btn-confirm").addEventListener("click", async () => {
  if (!selected) return;
  const monto = document.getElementById("monto-input").value.trim();
  if (!monto) return;

  const montoFinal = isGasto ? "-" + monto : monto;
  
  const rawFechaCaja = document.getElementById("fecha-caja").value;
  const rawFechaRdo  = document.getElementById("fecha-resultado").value;

  const fechaCajaSheet = formatDateForSheet(rawFechaCaja);
  const fechaRdoSheet  = formatDateForSheet(rawFechaRdo);

  // 1. Preparar datos visuales
  document.getElementById("sum-caja").textContent = fechaCajaSheet;
  document.getElementById("sum-rdo").textContent = fechaRdoSheet;
  
  const montoSpan = document.getElementById("sum-monto");
  montoSpan.textContent = isGasto ? `-$${monto}` : `+$${monto}`;
  montoSpan.style.color = isGasto ? 'var(--red)' : 'var(--green)';

  const cats = isGasto ? CATS_GASTO : CATS_INGRESO;
  const catObj = cats.find(c => c[1] === selected);
  document.getElementById("sum-cat").textContent = `${catObj ? catObj[0] : ''} ${selected}`;

  // 2. Reiniciar UI de la barra
  const bar = document.getElementById("progress-bar");
  const statusEl = document.getElementById("status-text");
  const checkWrap = document.getElementById("success-celebration");

  bar.classList.remove("success-state");
  bar.style.transition = 'none';
  bar.style.width = '0%';
  checkWrap.classList.remove("show");
  statusEl.style.color = "var(--text2)";
  statusEl.textContent = "Iniciando...";

  showOverlay("ov-loading");

  // 3. Inicio Rápido (0 a 50%)
  setTimeout(() => {
    bar.style.transition = 'width 0.8s cubic-bezier(0.2, 0.8, 0.2, 1)';
    bar.style.width = '45%';
    statusEl.textContent = "Mandando fechas y monto...";
  }, 50);

  // 4. Segundo paso visual
  stepsTimeout = setTimeout(() => {
    bar.style.transition = 'width 1.2s cubic-bezier(0.1, 0.8, 0.4, 1)';
    bar.style.width = '75%';
    statusEl.textContent = "Registrando categoría...";
  }, 800);

  // 5. Creep infinito (nunca se detiene)
  creepInterval = setInterval(() => {
    let currentW = parseFloat(bar.style.width);
    if(currentW < 96) {
      bar.style.transition = 'width 0.5s linear';
      bar.style.width = (currentW + 1) + '%';
      statusEl.textContent = "Guardando en hoja...";
    }
  }, 1000);

  try {
    // LLAMADA AL SERVIDOR
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        monto: montoFinal,
        descripcion: textoParam,
        app: appParam,
        categoria: selected,
        yaConSigno: true,
        fechaResultado: fechaRdoSheet,
        fechaCaja: fechaCajaSheet
      })
    });
    
    // 6. Celebración (Todo ok)
    clearTimeout(stepsTimeout);
    clearInterval(creepInterval);

    // Barra al 100% y cambia a color verde
    bar.style.transition = 'width 0.3s ease-out, background-color 0.3s ease';
    bar.style.width = '100%';
    bar.classList.add("success-state");

    statusEl.textContent = "¡Completado!";
    statusEl.style.opacity = "0"; // Lo ocultamos para darle foco al check

    // Aparece el check y texto en la misma pantalla
    checkWrap.classList.add("show");

    // Cierra luego de admirar la animación
    setTimeout(() => window.close(), 2300);

  } catch {
    clearTimeout(stepsTimeout);
    clearInterval(creepInterval);
    hideAll();
    showOverlay("ov-error");
  }
});

document.getElementById("btn-cancel").addEventListener("click", () => window.close());

function showOverlay(id) { hideAll(); document.getElementById(id).classList.add("show"); }
function hideAll() { document.querySelectorAll(".overlay").forEach(o => o.classList.remove("show")); }
</script>
</body>
</html>
