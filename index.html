<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pago</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* =========================================
   VARIABLES & RESET
   ========================================= */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #111110;
  --surface: #1c1c1a;
  --surface2: #252523;
  --border: #2e2e2b;
  --text: #f0f0ee;
  --text2: #888880;
  --text3: #444440;
  --red: #e05c4b;
  --green: #22c55e;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* =========================================
   UI PRINCIPAL
   ========================================= */
.dates-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 24px 20px 0;
}

.date-field {
  display: flex;
  flex-direction: column;
  gap: 5px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
}

.date-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
}

.date-input {
  background: none;
  border: none;
  outline: none;
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  color: var(--text);
  width: 100%;
  cursor: pointer;
  color-scheme: dark;
}

.amount-block { padding: 20px 20px 0; }

.amount-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.amount-left {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  min-width: 0;
}

.amount-sign {
  font-family: 'Geist Mono', monospace;
  font-size: 32px;
  font-weight: 300;
  line-height: 1;
  flex-shrink: 0;
  transition: color 0.2s;
  padding-bottom: 2px;
}

.amount-sign.neg { color: var(--red); }
.amount-sign.pos { color: var(--green); }

.amount-input {
  font-family: 'Geist Mono', monospace;
  font-size: 40px;
  font-weight: 300;
  line-height: 1;
  color: var(--text);
  background: none;
  border: none;
  outline: none;
  width: 100%;
  caret-color: var(--text2);
  letter-spacing: -1px;
  min-width: 0;
}

.amount-input::placeholder { color: var(--text3); }

.toggle-btn {
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text2);
  white-space: nowrap;
}

.toggle-btn.gasto  { color: var(--red);   border-color: rgba(224,92,75,0.3);   background: rgba(224,92,75,0.08); }
.toggle-btn.ingreso{ color: var(--green); border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.08); }

.divider { height: 1px; background: var(--border); margin: 18px 20px 0; }

.search-wrap { 
  padding: 14px 20px 0; 
  position: relative;
}

.search-icon {
  position: absolute;
  left: 32px;
  top: 25px;
  width: 16px;
  height: 16px;
  stroke: var(--text3);
}

.search-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  outline: none;
  font-family: 'Geist', sans-serif;
  font-size: 14px;
  color: var(--text);
  padding: 10px 14px 10px 38px;
  caret-color: var(--text2);
}

.search-input::placeholder { color: var(--text3); }

.categories-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 12px 20px 0;
  -webkit-overflow-scrolling: touch;
}

.cat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.cat-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  width: 100%;
}

.cat-item:active { transform: scale(0.97); }

.cat-emoji { font-size: 16px; flex-shrink: 0; line-height: 1; }

.cat-name {
  font-size: 12px;
  font-weight: 400;
  color: var(--text2);
  transition: color 0.15s;
  line-height: 1.2;
}

.cat-item.selected { background: var(--surface2); border-color: var(--text3); }
.cat-item.selected .cat-name { color: var(--text); font-weight: 500; }
.cat-item.hidden { display: none; }

.confirm-wrap {
  padding: 14px 20px 32px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  margin-top: 12px;
}

.btn-confirm {
  width: 100%;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  padding: 15px;
  font-family: 'Geist', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}

.btn-confirm:active { opacity: 0.85; }
.btn-confirm:disabled { opacity: 0.15; cursor: not-allowed; }

/* =========================================
   OVERLAY DE CARGA (FOCUS MODE)
   ========================================= */
.overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  padding: 40px 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 100;
}

.overlay.show { opacity: 1; pointer-events: all; }

.spacer {
  flex: 1;
  min-height: 20px;
}

.echo-container {
  display: flex;
  flex-direction: column;
  width: 100%;
}

.status-text {
  font-size: 15px;
  color: #ffffff;
  margin-bottom: 16px;
  font-weight: 500;
  text-align: center;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.progress-wrapper {
  position: relative;
  width: 100%;
  height: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.progress-bar {
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 0%;
  background: var(--green);
  border-radius: 5px;
  overflow: hidden;
  transition: width 0.2s linear;
}

.progress-stripes {
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    45deg,
    rgba(255, 255, 255, 0.25) 0,
    rgba(255, 255, 255, 0.25) 12px,
    transparent 12px,
    transparent 24px
  );
  background-size: 34px 34px;
  animation: moveStripesReverse 0.8s linear infinite reverse;
}

.progress-shimmer {
  position: absolute;
  top: 0; left: 0; bottom: 0; width: 60%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
  transform: skewX(-20deg) translateX(-150%);
  animation: shimmer 1.8s infinite;
}

@keyframes moveStripesReverse {
  0% { background-position: 0 0; }
  100% { background-position: 34px 0; }
}

@keyframes shimmer {
  100% { transform: skewX(-20deg) translateX(250%); }
}

#ov-error { align-items: center; justify-content: center; gap: 12px; }
.error-icon { font-size: 36px; }
.error-title { font-size: 18px; font-weight: 500; }
.cancel-btn { font-size: 13px; color: var(--text2); background: none; border: none; cursor: pointer; padding: 4px 0; }
</style>
</head>
<body>

<div class="dates-row">
  <div class="date-field">
    <span class="date-label">Fecha Caja</span>
    <input class="date-input" type="date" id="fecha-caja">
  </div>
  <div class="date-field">
    <span class="date-label">Fecha Resultado</span>
    <input class="date-input" type="date" id="fecha-resultado">
  </div>
</div>

<div class="amount-block">
  <div class="amount-row">
    <div class="amount-left">
      <span class="amount-sign neg" id="amount-sign">−</span>
      <input class="amount-input" id="monto-input" type="text" inputmode="decimal" placeholder="0,00">
    </div>
    <button class="toggle-btn gasto" id="toggle-btn">Gasto</button>
  </div>
</div>

<div class="divider"></div>

<div class="search-wrap">
  <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="8"></circle>
    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
  </svg>
  <input class="search-input" id="search-input" type="text" placeholder="Buscar categoría..." autocomplete="off" autocorrect="off" spellcheck="false">
</div>

<div class="categories-wrap">
  <div class="cat-grid" id="cat-grid"></div>
</div>

<div class="confirm-wrap">
  <button class="btn-confirm" id="btn-confirm" disabled>Registrar</button>
</div>

<div class="overlay" id="ov-loading">
  
  <div class="spacer"></div> <div class="echo-container">
    <div class="dates-row" style="padding: 0; gap: 16px;">
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <span class="date-label" style="font-size: 13px; color: var(--text2);">Fecha Caja</span>
        <div class="date-field" style="padding: 16px; align-items: center; justify-content: center;">
          <span class="date-input" id="echo-caja" style="font-size: 20px; text-align: center; cursor: default;"></span>
        </div>
      </div>
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <span class="date-label" style="font-size: 13px; color: var(--text2);">Fecha Resultado</span>
        <div class="date-field" style="padding: 16px; align-items: center; justify-content: center;">
          <span class="date-input" id="echo-rdo" style="font-size: 20px; text-align: center; cursor: default;"></span>
        </div>
      </div>
    </div>

    <div class="amount-block" style="padding: 0; margin-top: 36px;">
      <span class="date-label" style="font-size: 13px; display: block; margin-bottom: 10px; color: var(--text2);">Monto</span>
      <div class="amount-row">
        <div class="amount-left">
          <span class="amount-sign" id="echo-sign" style="font-size: 48px;"></span>
          <span class="amount-input" id="echo-monto" style="font-size: 58px; display: block;"></span>
        </div>
      </div>
    </div>

    <div style="padding: 0; margin-top: 36px;">
      <span class="date-label" style="font-size: 13px; display: block; margin-bottom: 10px; color: var(--text2);">Categoría</span>
      <div class="cat-item selected" style="cursor: default; padding: 18px 24px; width: fit-content; gap: 12px;">
        <span class="cat-emoji" id="echo-emoji" style="font-size: 28px;"></span>
        <span class="cat-name" id="echo-cat-name" style="font-size: 20px;"></span>
      </div>
    </div>
  </div>

  <div class="spacer"></div> <div style="width: 100%;">
    <div class="status-text">Cargando...</div>
    <div class="progress-wrapper">
      <div class="progress-bar" id="progress-bar">
        <div class="progress-stripes"></div>
        <div class="progress-shimmer"></div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="ov-error">
  <span class="error-icon">✕</span>
  <span class="error-title">Error</span>
  <span style="font-family:'Geist Mono', monospace; font-size:12px; color:var(--text2);">No se pudo registrar</span>
  <button class="cancel-btn" style="margin-top:16px" onclick="hideAll()">Volver</button>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIVeD1gCQba82X83v2bG1mJdCvLr3CLToXHxXZbhIiV6eYQCDR9llhdUZqbizGJSSG/exec";

const CATS_GASTO = [
  ["🍽️","Comida"],["🚗","Transporte"],["🔧","Auto"],["⛽","Combustible"],
  ["💪","GYM"],["👕","Ropa"],["🎁","Cumples y Regalos"],["🛒","Compra"],
  ["🦷","Dentista"],["📱","Suscripción"],["🧴","Salud y aseo"],["🎉","Evento"],
  ["🎓","Facultad"],["📚","Educación"],["🅿️","Estacionamiento"],["📡","Datos"],
  ["✂️","Peluquería"],["💸","Propinas"],["🎲","Apuesta y Juego"],["🛡️","Seguro"],
  ["⏳","A confirmar"],["📦","Otros"]
];

const CATS_INGRESO = [
  ["💼","Sueldo Lucom"],["💰","Comisión Lucom"],["🎓","Clases"],["🏷️","Venta"],
  ["🎄","Aguinaldo Lucom"],["📈","Rendimientos"],["🎁","Cumples y Regalos"],
  ["🎲","Apuesta y Juego"],["⏳","A confirmar"],["📦","Otros"]
];

// Leer params
const p        = new URLSearchParams(window.location.search);
const textoParam = decodeURIComponent(p.get("texto") || "");
const appParam   = (p.get("app") || "").toLowerCase();
const signoParam = p.get("signo") || "negativo";

function extraerMonto(texto) {
  const match = texto.match(/\$\s*([\d.,]+)/);
  if (!match) return "";
  return match[1];
}

function todayStr() {
  return new Date().toISOString().split("T")[0];
}

function formatDateForSheet(dateStr) {
  const [y, m, d] = dateStr.split("-");
  return `${d}/${m}/${y}`;
}

// State
let isGasto = signoParam !== "positivo";
let selected = null;

// Init UI
document.getElementById("monto-input").value = extraerMonto(textoParam);
document.getElementById("fecha-resultado").value = todayStr();
document.getElementById("fecha-caja").value = todayStr();

const toggleBtn = document.getElementById("toggle-btn");
const signEl    = document.getElementById("amount-sign");

function updateToggle() {
  if (isGasto) {
    toggleBtn.textContent = "Gasto";
    toggleBtn.className = "toggle-btn gasto";
    signEl.textContent = "−";
    signEl.className = "amount-sign neg";
  } else {
    toggleBtn.textContent = "Ingreso";
    toggleBtn.className = "toggle-btn ingreso";
    signEl.textContent = "+";
    signEl.className = "amount-sign pos";
  }
  selected = null;
  document.getElementById("btn-confirm").disabled = true;
  document.getElementById("search-input").value = "";
  buildCats();
}

toggleBtn.addEventListener("click", () => { isGasto = !isGasto; updateToggle(); });

function buildCats() {
  const grid = document.getElementById("cat-grid");
  grid.innerHTML = "";
  const cats = isGasto ? CATS_GASTO : CATS_INGRESO;
  cats.forEach(([emoji, name]) => {
    const btn = document.createElement("button");
    btn.className = "cat-item";
    btn.dataset.name = name.toLowerCase();
    btn.innerHTML = `<span class="cat-emoji">${emoji}</span><span class="cat-name">${name}</span>`;
    btn.addEventListener("click", () => {
      document.querySelectorAll(".cat-item").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selected = name;
      document.getElementById("btn-confirm").disabled = false;
      btn.scrollIntoView({ behavior: "smooth", block: "nearest" });
    });
    grid.appendChild(btn);
  });
}

buildCats();
updateToggle();

document.getElementById("search-input").addEventListener("input", e => {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll(".cat-item").forEach(btn => {
    btn.classList.toggle("hidden", q.length > 0 && !btn.dataset.name.includes(q));
  });
});

// LOGICA DE CONFIRMACIÓN Y ANIMACIONES
let stepsTimeout, creepInterval;

document.getElementById("btn-confirm").addEventListener("click", async () => {
  if (!selected) return;
  const monto = document.getElementById("monto-input").value.trim();
  if (!monto) return;

  const montoFinal = isGasto ? "-" + monto : monto;
  
  const rawFechaCaja = document.getElementById("fecha-caja").value;
  const rawFechaRdo  = document.getElementById("fecha-resultado").value;

  const fechaCajaSheet = formatDateForSheet(rawFechaCaja);
  const fechaRdoSheet  = formatDateForSheet(rawFechaRdo);

  // 1. Reflejar datos ampliados en la pantalla de carga
  document.getElementById("echo-caja").textContent = rawFechaCaja.split("-").reverse().join("/");
  document.getElementById("echo-rdo").textContent = rawFechaRdo.split("-").reverse().join("/");
  
  const echoSign = document.getElementById("echo-sign");
  echoSign.textContent = isGasto ? "−" : "+";
  echoSign.className = isGasto ? "amount-sign neg" : "amount-sign pos";
  
  document.getElementById("echo-monto").textContent = monto;

  const cats = isGasto ? CATS_GASTO : CATS_INGRESO;
  const catObj = cats.find(c => c[1] === selected);
  document.getElementById("echo-emoji").textContent = catObj ? catObj[0] : '';
  document.getElementById("echo-cat-name").textContent = selected;

  // 2. Reiniciar UI de la barra
  const bar = document.getElementById("progress-bar");
  bar.style.transition = 'none';
  bar.style.width = '0%';

  showOverlay("ov-loading");

  // 3. Inicio Rápido (0 a 50%)
  setTimeout(() => {
    bar.style.transition = 'width 0.8s cubic-bezier(0.2, 0.8, 0.2, 1)';
    bar.style.width = '45%';
  }, 50);

  // 4. Segundo paso visual
  stepsTimeout = setTimeout(() => {
    bar.style.transition = 'width 1.2s cubic-bezier(0.1, 0.8, 0.4, 1)';
    bar.style.width = '75%';
  }, 800);

  // 5. Creep infinito
  creepInterval = setInterval(() => {
    let currentW = parseFloat(bar.style.width);
    if(currentW < 96) {
      bar.style.transition = 'width 0.5s linear';
      bar.style.width = (currentW + 1) + '%';
    }
  }, 1000);

  try {
    // LLAMADA AL SERVIDOR SEGURA (keepalive: true permite cerrar el navegador sin riesgo)
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      keepalive: true,
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        monto: montoFinal,
        descripcion: textoParam,
        app: appParam,
        categoria: selected,
        yaConSigno: true,
        fechaResultado: fechaRdoSheet,
        fechaCaja: fechaCajaSheet
      })
    });
    
    // 6. Cierre Automático (Éxito)
    clearTimeout(stepsTimeout);
    clearInterval(creepInterval);

    // Barra al 100% y cierre instantáneo
    bar.style.transition = 'width 0.1s ease-out';
    bar.style.width = '100%';

    setTimeout(() => window.close(), 150);

  } catch {
    clearTimeout(stepsTimeout);
    clearInterval(creepInterval);
    hideAll();
    showOverlay("ov-error");
  }
});

function showOverlay(id) { hideAll(); document.getElementById(id).classList.add("show"); }
function hideAll() { document.querySelectorAll(".overlay").forEach(o => o.classList.remove("show")); }
</script>
</body>
</html>
