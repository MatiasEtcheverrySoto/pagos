<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pago</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #fafaf9;
  --text: #1a1a18;
  --text2: #888880;
  --text3: #bbbbb0;
  --border: #e8e8e4;
  --red: #c0392b;
  --green: #27ae60;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px 0;
}

.app-tag {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
}

.cancel-btn {
  font-size: 13px;
  color: var(--text3);
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Geist', sans-serif;
  padding: 4px 0;
}

.amount-block { padding: 28px 24px 0; }

.amount-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
}

.amount-sign {
  font-family: 'Geist Mono', monospace;
  font-size: 28px;
  font-weight: 300;
  line-height: 1;
  padding-bottom: 3px;
}

.amount-sign.neg { color: var(--red); }
.amount-sign.pos { color: var(--green); }

.amount-input {
  font-family: 'Geist Mono', monospace;
  font-size: 44px;
  font-weight: 300;
  color: var(--text);
  background: none;
  border: none;
  outline: none;
  width: 100%;
  caret-color: var(--text2);
  letter-spacing: -1px;
}

.amount-input::placeholder { color: var(--text3); }

.divider { height: 1px; background: var(--border); margin: 20px 24px 0; }

.search-wrap { padding: 16px 24px 0; }

.search-input {
  width: 100%;
  background: none;
  border: none;
  border-bottom: 1px solid var(--border);
  outline: none;
  font-family: 'Geist', sans-serif;
  font-size: 14px;
  color: var(--text);
  padding: 0 0 10px;
  caret-color: var(--text2);
}

.search-input::placeholder { color: var(--text3); }

.categories-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 12px 24px 0;
  -webkit-overflow-scrolling: touch;
}

.cat-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  background: none;
  border-left: none;
  border-right: none;
  border-top: none;
  width: 100%;
  text-align: left;
  transition: opacity 0.1s;
}

.cat-item:first-child { border-top: 1px solid var(--border); }
.cat-item:active { opacity: 0.4; }

.cat-name {
  font-size: 15px;
  font-weight: 400;
  color: var(--text2);
  transition: color 0.15s;
}

.cat-check {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.cat-item.selected .cat-name { color: var(--text); font-weight: 500; }
.cat-item.selected .cat-check { background: var(--text); border-color: var(--text); }
.cat-item.selected .cat-check::after {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: white;
}

.cat-item.hidden { display: none; }

.confirm-wrap {
  padding: 16px 24px 36px;
  background: var(--bg);
  border-top: 1px solid var(--border);
}

.btn-confirm {
  width: 100%;
  background: var(--text);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 16px;
  font-family: 'Geist', sans-serif;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s;
}

.btn-confirm:active { opacity: 0.8; }
.btn-confirm:disabled { opacity: 0.2; cursor: not-allowed; }

.overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 100;
}

.overlay.show { opacity: 1; pointer-events: all; }
.overlay-icon { font-size: 36px; }
.overlay-title { font-size: 18px; font-weight: 500; }
.overlay-sub { font-size: 12px; color: var(--text2); font-family: 'Geist Mono', monospace; letter-spacing: 0.05em; }

.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <span class="app-tag" id="app-tag">—</span>
  <button class="cancel-btn" id="btn-cancel">Cancelar</button>
</div>

<div class="amount-block">
  <div class="amount-row">
    <span class="amount-sign" id="amount-sign">−</span>
    <input class="amount-input" id="monto-input" type="text" inputmode="decimal" placeholder="0,00">
  </div>
</div>

<div class="divider"></div>

<div class="search-wrap">
  <input class="search-input" id="search-input" type="text" placeholder="Buscar..." autocomplete="off" autocorrect="off" spellcheck="false">
</div>

<div class="categories-wrap" id="cat-list"></div>

<div class="confirm-wrap">
  <button class="btn-confirm" id="btn-confirm" disabled>Registrar</button>
</div>

<div class="overlay" id="ov-loading"><div class="spinner"></div></div>

<div class="overlay" id="ov-ok">
  <span class="overlay-icon">✓</span>
  <span class="overlay-title">Registrado</span>
  <span class="overlay-sub" id="ok-detail"></span>
</div>

<div class="overlay" id="ov-error">
  <span class="overlay-icon">✕</span>
  <span class="overlay-title">Error</span>
  <span class="overlay-sub">No se pudo registrar</span>
  <button class="cancel-btn" style="margin-top:16px;color:var(--text2)" onclick="hideAll()">Volver</button>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIVeD1gCQba82X83v2bG1mJdCvLr3CLToXHxXZbhIiV6eYQCDR9llhdUZqbizGJSSG/exec";

const CATS_NEG = [
  "Comida","Transporte","Auto","Combustible","GYM","Ropa",
  "Cumples y Regalos","Compra","Dentista","Suscripción",
  "Salud y aseo","Evento","Facultad","Educación","Estacionamiento",
  "Datos","Peluquería","Propinas","Apuesta y Juego","Seguro",
  "Impuestos","Desconocido","Otros"
];

const CATS_POS = [
  "Sueldo Lucom","Comisión Lucom","Clases","Venta","Aguinaldo Lucom",
  "Rendimientos","Cumples y Regalos","Apuesta y Juego","Desconocido","Otros"
];

const p        = new URLSearchParams(window.location.search);
const montoParam = p.get("monto") || "";
const appParam   = (p.get("app") || "").toLowerCase();
const textoParam = p.get("texto") || "";
const signoParam = p.get("signo") || "negativo";
const isPos      = signoParam === "positivo";

document.getElementById("app-tag").textContent = appParam || "pago";
document.getElementById("monto-input").value = montoParam;

const signEl = document.getElementById("amount-sign");
signEl.textContent = isPos ? "+" : "−";
signEl.className   = "amount-sign " + (isPos ? "pos" : "neg");

// Build list
const cats    = isPos ? CATS_POS : CATS_NEG;
const catList = document.getElementById("cat-list");
let selected  = null;

cats.forEach(name => {
  const btn = document.createElement("button");
  btn.className    = "cat-item";
  btn.dataset.name = name.toLowerCase();
  btn.innerHTML    = `<span class="cat-name">${name}</span><span class="cat-check"></span>`;
  btn.addEventListener("click", () => {
    document.querySelectorAll(".cat-item").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selected = name;
    document.getElementById("btn-confirm").disabled = false;
    btn.scrollIntoView({ behavior: "smooth", block: "nearest" });
  });
  catList.appendChild(btn);
});

// Search
document.getElementById("search-input").addEventListener("input", e => {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll(".cat-item").forEach(btn => {
    btn.classList.toggle("hidden", q.length > 0 && !btn.dataset.name.includes(q));
  });
});

// Confirm
document.getElementById("btn-confirm").addEventListener("click", async () => {
  if (!selected) return;
  const monto = document.getElementById("monto-input").value.trim();
  if (!monto) return;

  const montoFinal = isPos ? monto : "-" + monto;
  showOverlay("ov-loading");

  try {
    const res  = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        monto: montoFinal,
        descripcion: textoParam,
        app: appParam,
        categoria: selected,
        yaConSigno: true
      })
    });
    const json = await res.json();
    hideAll();
    if (json.status === "ok" || json.status === "ignorado") {
      document.getElementById("ok-detail").textContent = `${montoFinal} · ${selected}`;
      showOverlay("ov-ok");
      setTimeout(() => window.close(), 2000);
    } else {
      showOverlay("ov-error");
    }
  } catch {
    hideAll();
    showOverlay("ov-error");
  }
});

document.getElementById("btn-cancel").addEventListener("click", () => window.close());

function showOverlay(id) { hideAll(); document.getElementById(id).classList.add("show"); }
function hideAll() { document.querySelectorAll(".overlay").forEach(o => o.classList.remove("show")); }
</script>
</body>
</html>
