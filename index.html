<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pago</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #111110;
  --surface: #1c1c1a;
  --surface2: #252523;
  --border: #2e2e2b;
  --text: #f0f0ee;
  --text2: #888880;
  --text3: #444440;
  --red: #e05c4b;
  --green: #4caf82;
  --accent: #ffffff;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* --- UI Existente Optimizada --- */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 0; }
.app-tag { font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.15em; color: var(--text3); text-transform: uppercase; }
.cancel-btn { font-size: 13px; color: var(--text2); background: none; border: none; cursor: pointer; padding: 4px 0; }
.dates-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px 20px 0; }
.date-field { display: flex; flex-direction: column; gap: 5px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
.date-label { font-family: 'Geist Mono', monospace; font-size: 9px; letter-spacing: 0.15em; color: var(--text3); text-transform: uppercase; }
.date-input { background: none; border: none; outline: none; font-family: 'Geist Mono', monospace; font-size: 13px; color: var(--text); width: 100%; color-scheme: dark; }

.amount-block { padding: 20px 20px 0; }
.amount-row { display: flex; align-items: center; gap: 10px; }
.amount-left { display: flex; align-items: baseline; gap: 4px; flex: 1; min-width: 0; }
.amount-sign { font-family: 'Geist Mono', monospace; font-size: 26px; font-weight: 300; transition: color 0.2s; }
.amount-sign.neg { color: var(--red); }
.amount-sign.pos { color: var(--green); }
.amount-input { font-family: 'Geist Mono', monospace; font-size: 40px; font-weight: 300; color: var(--text); background: none; border: none; outline: none; width: 100%; letter-spacing: -1px; }
.amount-input::placeholder { color: var(--text3); }

.toggle-btn { flex-shrink: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; color: var(--text2); }
.toggle-btn.gasto { color: var(--red); border-color: rgba(224,92,75,0.3); background: rgba(224,92,75,0.08); }
.toggle-btn.ingreso { color: var(--green); border-color: rgba(76,175,130,0.3); background: rgba(76,175,130,0.08); }

.divider { height: 1px; background: var(--border); margin: 18px 20px 0; }
.search-wrap { padding: 14px 20px 0; }
.search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; outline: none; font-size: 14px; color: var(--text); padding: 10px 14px; }
.categories-wrap { flex: 1; overflow-y: auto; padding: 12px 20px 0; -webkit-overflow-scrolling: touch; }
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cat-item { display: flex; align-items: center; gap: 8px; padding: 11px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; text-align: left; }
.cat-item.selected { background: var(--surface2); border-color: var(--text3); }
.cat-item.selected .cat-name { color: var(--text); font-weight: 500; }
.cat-item.hidden { display: none; }
.cat-name { font-size: 12px; color: var(--text2); }

.confirm-wrap { padding: 14px 20px 32px; background: var(--bg); border-top: 1px solid var(--border); margin-top: 12px; }
.btn-confirm { width: 100%; background: var(--text); color: var(--bg); border: none; border-radius: 10px; padding: 15px; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-confirm:disabled { opacity: 0.15; }

/* --- NUEVO: Overlay de Carga Power Functions --- */
.overlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 100;
}
.overlay.show { opacity: 1; pointer-events: all; }

.loading-content { width: 100%; max-width: 300px; text-align: center; }
.loading-data-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 24px; text-align: left;
}
.data-item { font-family: 'Geist Mono', monospace; font-size: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; }
.data-label { color: var(--text3); text-transform: uppercase; }
.data-val { color: var(--text); }

.status-text { font-family: 'Geist Mono', monospace; font-size: 14px; color: var(--text2); margin-bottom: 12px; letter-spacing: 0.1em; }

/* --- Barra de Progreso Ribbing --- */
.progress-container {
  width: 100%; height: 6px; background: var(--surface2); border-radius: 10px; overflow: hidden; position: relative;
}
.progress-bar {
  height: 100%; width: 0%; background: var(--text);
  background-image: linear-gradient(45deg, rgba(255,255,255,0.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.15) 75%, transparent 75%, transparent);
  background-size: 20px 20px;
  animation: ribbing 1s linear infinite;
  transition: width 0.4s ease-out;
}

@keyframes ribbing {
  from { background-position: 0 0; }
  to { background-position: 20px 0; }
}

.success-icon {
  width: 60px; height: 60px; border-radius: 50%; background: var(--green);
  display: flex; align-items: center; justify-content: center; font-size: 30px;
  margin-bottom: 16px; transform: scale(0); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.overlay.success .success-icon { transform: scale(1); }
</style>
</head>
<body>

<div class="topbar">
  <span class="app-tag" id="app-tag">—</span>
  <button class="cancel-btn" id="btn-cancel">Cancelar</button>
</div>

<div class="dates-row">
  <div class="date-field">
    <span class="date-label">Fecha Resultado</span>
    <input class="date-input" type="date" id="fecha-resultado">
  </div>
  <div class="date-field">
    <span class="date-label">Fecha Caja</span>
    <input class="date-input" type="date" id="fecha-caja">
  </div>
</div>

<div class="amount-block">
  <div class="amount-row">
    <div class="amount-left">
      <span class="amount-sign neg" id="amount-sign">−</span>
      <input class="amount-input" id="monto-input" type="text" inputmode="decimal" placeholder="0,00">
    </div>
    <button class="toggle-btn gasto" id="toggle-btn">Gasto</button>
  </div>
</div>

<div class="divider"></div>
<div class="search-wrap">
  <input class="search-input" id="search-input" type="text" placeholder="Buscar categoría..." autocomplete="off">
</div>

<div class="categories-wrap">
  <div class="cat-grid" id="cat-grid"></div>
</div>

<div class="confirm-wrap">
  <button class="btn-confirm" id="btn-confirm" disabled>Registrar</button>
</div>

<div class="overlay" id="ov-process">
  <div class="loading-content" id="content-loading">
    <div class="loading-data-card" id="data-preview">
      </div>
    <div class="status-text" id="status-text">CARGANDO...</div>
    <div class="progress-container">
      <div class="progress-bar" id="pb"></div>
    </div>
  </div>
  
  <div class="loading-content" id="content-success" style="display:none">
    <div class="success-icon">✓</div>
    <h2 style="font-weight: 500; margin-bottom: 4px;">Guardado</h2>
    <p id="success-detail" style="color: var(--text2); font-family: 'Geist Mono'; font-size: 13px;"></p>
  </div>
</div>

<div class="overlay" id="ov-error">
  <span style="font-size:40px">✕</span>
  <h2 style="margin: 10px 0">Error</h2>
  <button class="cancel-btn" onclick="location.reload()">Reintentar</button>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIVeD1gCQba82X83v2bG1mJdCvLr3CLToXHxXZbhIiV6eYQCDR9llhdUZqbizGJSSG/exec";

const CATS_GASTO = [
  ["🍽️","Comida"],["🚗","Transporte"],["🔧","Auto"],["⛽","Combustible"],
  ["💪","GYM"],["👕","Ropa"],["🎁","Cumples"],["🛒","Compra"],
  ["🦷","Dentista"],["📱","Suscripción"],["🧴","Salud"],["🎉","Evento"],
  ["🎓","Facultad"],["📚","Educación"],["🅿️","Estacionamiento"],["📡","Datos"]
];

const CATS_INGRESO = [
  ["💼","Sueldo Lucom"],["💰","Comisión Lucom"],["🎓","Clases"],["🏷️","Venta"],
  ["📈","Rendimientos"],["🎁","Regalos"]
];

const p = new URLSearchParams(window.location.search);
const textoParam = decodeURIComponent(p.get("texto") || "");
const appParam = (p.get("app") || "pago").toLowerCase();
let isGasto = p.get("signo") !== "positivo";
let selected = null;

function todayStr() { return new Date().toISOString().split("T")[0]; }
function formatDate(s) { const [y,m,d] = s.split("-"); return `${d}/${m}/${y}`; }

// Inicialización
document.getElementById("app-tag").textContent = appParam;
document.getElementById("monto-input").value = (textoParam.match(/\$\s*([\d.,]+)/) || ["",""])[1];
document.getElementById("fecha-resultado").value = todayStr();
document.getElementById("fecha-caja").value = todayStr();

function updateToggle() {
  const btn = document.getElementById("toggle-btn");
  const sign = document.getElementById("amount-sign");
  btn.textContent = isGasto ? "Gasto" : "Ingreso";
  btn.className = `toggle-btn ${isGasto ? 'gasto' : 'ingreso'}`;
  sign.textContent = isGasto ? "−" : "+";
  sign.className = `amount-sign ${isGasto ? 'neg' : 'pos'}`;
  buildCats();
}

function buildCats() {
  const grid = document.getElementById("cat-grid");
  grid.innerHTML = "";
  (isGasto ? CATS_GASTO : CATS_INGRESO).forEach(([emoji, name]) => {
    const btn = document.createElement("button");
    btn.className = "cat-item";
    btn.dataset.name = name.toLowerCase();
    btn.innerHTML = `<span class="cat-emoji">${emoji}</span><span class="cat-name">${name}</span>`;
    btn.onclick = () => {
      document.querySelectorAll(".cat-item").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selected = name;
      document.getElementById("btn-confirm").disabled = false;
    };
    grid.appendChild(btn);
  });
}

document.getElementById("toggle-btn").onclick = () => { isGasto = !isGasto; updateToggle(); };
document.getElementById("search-input").oninput = (e) => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll(".cat-item").forEach(b => b.classList.toggle("hidden", q && !b.dataset.name.includes(q)));
};

// Lógica de Registro con Animación Power Functions
document.getElementById("btn-confirm").onclick = async () => {
  const monto = document.getElementById("monto-input").value.trim();
  const fRes = document.getElementById("fecha-resultado").value;
  const montoFinal = isGasto ? "-" + monto : monto;

  // 1. Mostrar Preview en el Overlay
  document.getElementById("data-preview").innerHTML = `
    <div class="data-item"><span class="data-label">Monto</span><span class="data-val">${montoFinal}</span></div>
    <div class="data-item"><span class="data-label">Cat</span><span class="data-val">${selected}</span></div>
    <div class="data-item"><span class="data-label">App</span><span class="data-val">${appParam}</span></div>
    <div class="data-item"><span class="data-label">Fecha</span><span class="data-val">${formatDate(fRes)}</span></div>
  `;
  
  const ov = document.getElementById("ov-process");
  ov.classList.add("show");
  
  // Simular progreso inicial para feedback instantáneo
  const pb = document.getElementById("pb");
  setTimeout(() => pb.style.width = "40%", 100);

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000);

    await fetch(APPS_SCRIPT_URL, {
      method: "POST", mode: "no-cors",
      body: JSON.stringify({
        monto: montoFinal, descripcion: textoParam, app: appParam,
        categoria: selected, yaConSigno: true,
        fechaResultado: formatDate(fRes),
        fechaCaja: formatDate(document.getElementById("fecha-caja").value)
      })
    });

    // 2. Éxito
    pb.style.width = "100%";
    setTimeout(() => {
      document.getElementById("content-loading").style.display = "none";
      document.getElementById("content-success").style.display = "block";
      document.getElementById("success-detail").textContent = `${montoFinal} en ${selected}`;
      ov.classList.add("success");
      
      // Auto-cerrar después de la animación
      setTimeout(() => window.close(), 1800);
    }, 500);

  } catch (e) {
    ov.classList.remove("show");
    document.getElementById("ov-error").classList.add("show");
  }
};

document.getElementById("btn-cancel").onclick = () => window.close();
updateToggle();
</script>
</body>
</html>
