<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pago</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #111110;
  --surface: #1c1c1a;
  --surface2: #252523;
  --border: #2e2e2b;
  --text: #f0f0ee;
  --text2: #888880;
  --text3: #444440;
  --red: #e05c4b;
  --green: #22c55e;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── DATES ── */
.dates-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 14px 16px 0;
  flex-shrink: 0;
}

.date-field {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 10px;
  position: relative;
  text-align: center;
  transition: opacity 0.25s ease;
}

/* Fecha atenuada cuando no aplica */
.date-field.dimmed {
  opacity: 0.28;
  pointer-events: none;
}

.date-label {
  font-family: 'Geist', sans-serif;
  font-size: 12px;
  color: var(--text2);
  font-weight: 400;
  line-height: 1.4;
}

.date-display {
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
}

.date-picker-overlay {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
  color-scheme: dark;
}

/* ── AMOUNT BLOCK ── */
.amount-block {
  padding: 12px 16px 12px;
  flex-shrink: 0;
}

.amount-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.amount-left {
  display: flex;
  align-items: center;
  flex: 1;
  min-width: 0;
}

.amount-sign {
  font-family: 'Geist Mono', monospace;
  font-size: 30px;
  font-weight: 300;
  line-height: 1;
  flex-shrink: 0;
  transition: color 0.2s;
  padding-bottom: 2px;
  margin-left: 20px;
  margin-right: 0;
}
.amount-sign.neg { color: var(--red); }
.amount-sign.pos { color: var(--green); }

.amount-input {
  font-family: 'Geist Mono', monospace;
  font-size: 38px;
  font-weight: 300;
  line-height: 1;
  color: var(--text);
  background: none;
  border: none;
  outline: none;
  width: 100%;
  caret-color: var(--text2);
  letter-spacing: -1px;
  min-width: 0;
  margin-left: 15px; /* 15px del signo */
}
.amount-input::placeholder { color: var(--text3); }

/* ── TOGGLES ── */
.toggles-col {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex-shrink: 0;
}

.toggle-btn {
  width: 25vw;
  border-radius: 8px;
  padding: 6px 0;
  font-family: 'Geist', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  text-align: center;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
}

.toggle-btn.gasto   { color: var(--red);   border-color: rgba(224,92,75,0.35);  background: rgba(224,92,75,0.09); }
.toggle-btn.ingreso { color: var(--green); border-color: rgba(34,197,94,0.35);  background: rgba(34,197,94,0.09); }
.toggle-btn.debito  { color: #a78bfa; border-color: rgba(167,139,250,0.35); background: rgba(167,139,250,0.09); }
.toggle-btn.credito { color: #60a5fa; border-color: rgba(96,165,250,0.35);  background: rgba(96,165,250,0.09); }
.toggle-btn.ars     { color: #fb923c; border-color: rgba(251,146,60,0.35);  background: rgba(251,146,60,0.09); }
.toggle-btn.usd     { color: #4ade80; border-color: rgba(74,222,128,0.35);  background: rgba(74,222,128,0.09); }

/* ── SEARCH ── */
.search-wrap {
  padding: 0 16px 12px;
  position: relative;
  flex-shrink: 0;
}

.search-icon {
  position: absolute;
  left: 28px; top: 11px;
  width: 15px; height: 15px;
  stroke: var(--text3);
}

.search-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  outline: none;
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  color: var(--text);
  padding: 8px 12px 8px 36px;
  caret-color: var(--text2);
}
.search-input::placeholder { color: var(--text3); }

/* ── CATEGORIES ── */
.categories-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 0;
  min-height: 0;
}

.cat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.cat-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  width: 100%;
}
.cat-item:active { transform: scale(0.97); }
.cat-emoji { font-size: 15px; flex-shrink: 0; line-height: 1; }
.cat-name {
  font-size: 12px; font-weight: 400;
  color: var(--text2); transition: color 0.15s; line-height: 1.2;
}
.cat-item.selected { background: var(--surface2); border-color: var(--text3); }
.cat-item.selected .cat-name { color: var(--text); font-weight: 500; }
.cat-item.hidden { display: none; }

.cat-separator {
  grid-column: 1 / -1;
  height: 1px;
  background: var(--border);
  margin: 2px 0;
}

/* ── CONFIRM ── */
.confirm-wrap {
  padding: 10px 16px 20px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.btn-confirm {
  width: 100%;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-family: 'Geist', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-confirm:active { opacity: 0.85; }
.btn-confirm:disabled { opacity: 0.15; cursor: not-allowed; }

/* ── OVERLAY ── */
.overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  padding: 32px 24px 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 100;
}
.overlay.show { opacity: 1; pointer-events: all; }

/* Contenido centrado verticalmente */
.echo-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 0;
  padding-bottom: 16px;
}

/* Echo fechas */
.echo-dates {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.echo-date-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  transition: opacity 0.2s;
}
.echo-date-block.hidden-date {
  display: none;
}
/* Cuando ambas fechas están ocultas, colapsar el grid */
.echo-dates:has(.echo-date-block.hidden-date:nth-child(1)):has(.echo-date-block.hidden-date:nth-child(2)) {
  display: none;
}
.echo-label {
  font-family: 'Geist', sans-serif;
  font-size: 12px;
  color: var(--text2);
}
.echo-date-val {
  font-family: 'Geist Mono', monospace;
  font-size: 15px;
  color: var(--text);
}

/* Echo monto */
.echo-monto-section { margin-top: 22px; }
.echo-section-label {
  font-family: 'Geist', sans-serif;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 6px;
}
.echo-monto-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.echo-sign {
  font-family: 'Geist Mono', monospace;
  font-size: 34px;
  font-weight: 300;
  line-height: 1;
}
.echo-sign.neg { color: var(--red); }
.echo-sign.pos { color: var(--green); }
.echo-num {
  font-family: 'Geist Mono', monospace;
  font-size: 38px;
  font-weight: 300;
  letter-spacing: -1px;
  color: var(--text);
  line-height: 1;
}
.echo-curr {
  font-family: 'Geist Mono', monospace;
  font-size: 38px;
  font-weight: 300;
  color: var(--text);
  line-height: 1;
}

/* Echo Por + Categoría vertical */
.echo-detail-section {
  margin-top: 22px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.echo-block { display: flex; flex-direction: column; gap: 6px; }
.echo-block-label {
  font-family: 'Geist', sans-serif;
  font-size: 12px;
  color: var(--text2);
}
.echo-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--text3);
  border-radius: 10px;
  padding: 10px 16px;
  align-self: flex-start;
}
.echo-pill-emoji { font-size: 20px; }
.echo-pill-name  { font-size: 15px; color: var(--text); font-weight: 500; }

/* ── PROGRESS — siempre al fondo ── */
.progress-section {
  flex-shrink: 0;
  padding: 0 0 32px;
}

.progress-label {
  font-family: 'Geist', sans-serif;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 10px;
}

.progress-wrapper {
  width: 100%;
  height: 8px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: var(--text);
  border-radius: 4px;
  position: relative;
  overflow: hidden;
}

.progress-stripes {
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    -55deg,
    transparent 0px, transparent 6px,
    rgba(0,0,0,0.2) 6px, rgba(0,0,0,0.2) 12px
  );
  background-size: 17px 100%;
  animation: move-left 0.5s linear infinite;
}
@keyframes move-left {
  from { background-position: 0 0; }
  to   { background-position: -17px 0; }
}

.progress-shimmer {
  position: absolute;
  top: 0; bottom: 0;
  left: -40%;
  width: 40%;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.55) 50%, transparent 100%);
  animation: shimmer-right 2s ease-in-out infinite;
}
@keyframes shimmer-right {
  0%   { left: -40%; }
  100% { left: 140%; }
}

.btn-otro {
  width: 100%;
  margin-top: 12px;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-family: 'Geist', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-otro:active { opacity: 0.85; }

/* ── ERROR OVERLAY ── */
#ov-error {
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 12px;
}
.error-icon { font-size: 36px; }
.error-title { font-size: 18px; font-weight: 500; }
.cancel-btn {
  font-size: 13px; color: var(--text2); background: none; border: none;
  cursor: pointer; font-family: 'Geist', sans-serif; padding: 4px 0;
}
</style>
</head>
<body>

<!-- Fechas: Caja primero, Resultado segundo -->
<div class="dates-row">
  <div class="date-field" id="field-caja">
    <span class="date-label">Caja</span>
    <span class="date-display" id="display-caja"></span>
    <input class="date-picker-overlay" type="date" id="fecha-caja" autocomplete="off">
  </div>
  <div class="date-field" id="field-rdo">
    <span class="date-label">Resultado</span>
    <span class="date-display" id="display-rdo"></span>
    <input class="date-picker-overlay" type="date" id="fecha-resultado" autocomplete="off">
  </div>
</div>

<!-- Monto + toggles -->
<div class="amount-block">
  <div class="amount-row">
    <div class="amount-left">
      <span class="amount-sign neg" id="amount-sign">−</span>
      <input class="amount-input" id="monto-input" type="text" inputmode="decimal"
        placeholder="0,00" autocomplete="off" autocorrect="off"
        autocapitalize="off" spellcheck="false" data-form-type="other">
    </div>
    <div class="toggles-col">
      <button class="toggle-btn gasto"   id="btn-tipo">Gasto</button>
      <button class="toggle-btn debito"  id="btn-tarjeta">Débito</button>
      <button class="toggle-btn ars"     id="btn-moneda">ARS</button>
    </div>
  </div>
</div>

<!-- Buscador -->
<div class="search-wrap">
  <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="8"></circle>
    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
  </svg>
  <input class="search-input" id="search-input" type="search" placeholder="Buscar categoría..."
    autocomplete="off" autocorrect="off" autocapitalize="off"
    spellcheck="false" data-form-type="other">
</div>

<!-- Categorías -->
<div class="categories-wrap">
  <div class="cat-grid" id="cat-grid"></div>
</div>

<!-- Confirmar -->
<div class="confirm-wrap">
  <button class="btn-confirm" id="btn-confirm" disabled>Registrar</button>
</div>

<!-- ── OVERLAY CARGA ── -->
<div class="overlay" id="ov-loading">

  <!-- Contenido centrado verticalmente -->
  <div class="echo-content">

    <div class="echo-dates">
      <div class="echo-date-block" id="echo-block-caja">
        <span class="echo-label">Caja</span>
        <span class="echo-date-val" id="echo-caja"></span>
      </div>
      <div class="echo-date-block" id="echo-block-rdo">
        <span class="echo-label">Resultado</span>
        <span class="echo-date-val" id="echo-rdo"></span>
      </div>
    </div>

    <div class="echo-monto-section">
      <div class="echo-section-label">Monto</div>
      <div class="echo-monto-row">
        <span class="echo-sign neg" id="echo-sign"></span>
        <span class="echo-num"      id="echo-monto"></span>
        <span class="echo-curr"     id="echo-currency"></span>
      </div>
    </div>

    <div class="echo-detail-section">
      <div class="echo-block">
        <span class="echo-block-label">Por</span>
        <div class="echo-pill">
          <span class="echo-pill-emoji" id="echo-tarjeta-emoji"></span>
          <span class="echo-pill-name"  id="echo-tarjeta-name"></span>
        </div>
      </div>
      <div class="echo-block">
        <span class="echo-block-label">Categoría</span>
        <div class="echo-pill">
          <span class="echo-pill-emoji" id="echo-emoji"></span>
          <span class="echo-pill-name"  id="echo-cat-name"></span>
        </div>
      </div>
    </div>

  </div><!-- /echo-content -->

  <!-- Barra y botón — siempre al fondo -->
  <div class="progress-section">
    <div class="progress-label">Registrando....</div>
    <div class="progress-wrapper">
      <div class="progress-bar" id="progress-bar">
        <div class="progress-stripes"></div>
        <div class="progress-shimmer"></div>
      </div>
    </div>
    <button class="btn-otro" id="btn-otro">Registrar Otro</button>
  </div>

</div>

<!-- ── OVERLAY ERROR ── -->
<div class="overlay" id="ov-error">
  <span class="error-icon">✕</span>
  <span class="error-title">Error</span>
  <span style="font-family:'Geist Mono',monospace;font-size:12px;color:var(--text2);">No se pudo registrar</span>
  <button class="cancel-btn" style="margin-top:16px" onclick="hideAll()">Volver</button>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIVeD1gCQba82X83v2bG1mJdCvLr3CLToXHxXZbhIiV6eYQCDR9llhdUZqbizGJSSG/exec";

const SOLO_CAJA = ["Inversión", "Bienes"];
const SEP = "SEP";

const CATS_GASTO = [
  ["🍽️","Comida"],["🚗","Transporte"],["🔧","Auto"],["⛽","Combustible"],
  ["💪","GYM"],["👕","Ropa"],["🎁","Cumples y Regalos"],["🛒","Compra"],
  ["🦷","Dentista"],["📱","Suscripción"],["🧴","Salud y aseo"],["🎉","Evento"],
  ["🎓","Facultad"],["📚","Educación"],["🅿️","Estacionamiento"],["📡","Datos"],
  ["✂️","Peluquería"],["💸","Propinas"],["🎲","Apuesta y Juego"],["🛡️","Seguro"],
  ["🏛️","Impuestos"],["❓","Desconocido"],["📦","Otros"],["⏳","A confirmar"],
  [SEP,SEP],
  ["📊","Inversión"],["🏠","Bienes"]
];

const CATS_INGRESO = [
  ["💼","Sueldo Lucom"],["💰","Comisión Lucom"],["🎓","Clases"],["🏷️","Venta"],
  ["🎄","Aguinaldo Lucom"],["📈","Rendimientos"],["🎁","Cumples y Regalos"],
  ["🎲","Apuesta y Juego"],["❓","Desconocido"],["📦","Otros"],["⏳","A confirmar"],
  [SEP,SEP],
  ["📊","Inversión"],["🏠","Bienes"]
];

const p          = new URLSearchParams(window.location.search);
const textoParam = decodeURIComponent(p.get("texto") || "");
const appParam   = (p.get("app") || "").toLowerCase();
const signoParam = p.get("signo") || "negativo";

function parsearNotificacion(texto) {
  let m = texto.match(/\$\s*([\d.,]+)/);
  if (m) return { amount: m[1], currency: "ARS" };
  m = texto.match(/USD\s*([\d.,]+)/i);
  if (m) return { amount: m[1], currency: "USD" };
  return { amount: "", currency: "ARS" };
}

function todayStr() { return new Date().toISOString().split("T")[0]; }

function formatDate(d) {
  if (!d) return "";
  const [y,mo,dd] = d.split("-");
  return `${dd}/${mo}/${y}`;
}

// Parsea cualquier string numérico a número JS
// Acepta: "1.234,56" / "1234,56" / "1234.56" / "1234"
function parsearNumero(str) {
  const s = String(str).trim().replace(/\s/g, "");
  if (s.includes(",")) return parseFloat(s.replace(/\./g, "").replace(",", "."));
  return parseFloat(s);
}

// Formato display: punto de miles, coma decimal, sin decimales si es entero
// 1234.5  → "1.234,50"
// 1234    → "1.234"
// 100.0   → "100"
function formatearDisplay(num) {
  if (isNaN(num) || num < 0) return "";
  const cents = Math.round(num * 100);
  const intPart = Math.floor(cents / 100);
  const decPart = cents % 100;
  const intStr  = intPart.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  return decPart === 0 ? intStr : intStr + "," + String(decPart).padStart(2, "0");
}

// Formato para el sheet: sin punto de miles, coma decimal, sin decimales si es entero
// 1234.5  → "1234,50"
// 1234    → "1234"
function formatearSheet(num) {
  if (isNaN(num) || num < 0) return "";
  const cents = Math.round(num * 100);
  const intPart = Math.floor(cents / 100);
  const decPart = cents % 100;
  return decPart === 0 ? String(intPart) : intPart + "," + String(decPart).padStart(2, "0");
}

// ── Estado ──
let isGasto   = signoParam !== "positivo";
let isCredito = false;
let isUSD     = false;
let selected  = null;
let selectedEmoji = "";

const parsed = parsearNotificacion(textoParam);
if (parsed.currency === "USD") isUSD = true;
// Formatear el monto extraído para mostrar en display
const montoInicial = parsed.amount ? formatearDisplay(parsearNumero(parsed.amount)) : "";

// ── Fechas ──
const inputCaja   = document.getElementById("fecha-caja");
const inputRdo    = document.getElementById("fecha-resultado");
const displayCaja = document.getElementById("display-caja");
const displayRdo  = document.getElementById("display-rdo");
const fieldCaja   = document.getElementById("field-caja");
const fieldRdo    = document.getElementById("field-rdo");

function updateDates() {
  displayCaja.textContent = formatDate(inputCaja.value);
  displayRdo.textContent  = formatDate(inputRdo.value);
}
inputCaja.addEventListener("change", updateDates);
inputRdo.addEventListener("change",  updateDates);

document.getElementById("monto-input").value = montoInicial;
inputCaja.value = todayStr();
inputRdo.value  = todayStr();
updateDates();

// ── Formateo en vivo del monto mientras se escribe ──
document.getElementById("monto-input").addEventListener("input", function() {
  const raw    = this.value;
  const cursor = this.selectionStart;
  const prevLen = raw.length;

  // Extraer solo dígitos y coma
  const soloDigitos = raw.replace(/[^0-9,]/g, "");
  const partes      = soloDigitos.split(",");
  const intRaw      = partes[0] || "";
  const decPart     = partes.length > 1 ? "," + partes[1].substring(0, 2) : "";

  // Agregar puntos de miles a la parte entera
  const intFormateado = intRaw.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  const formatted     = intFormateado + decPart;

  if (formatted !== raw) {
    this.value = formatted;
    // Ajustar cursor por los puntos agregados/quitados
    const diff = formatted.length - prevLen;
    this.setSelectionRange(cursor + diff, cursor + diff);
  }
});

// ── Atenuado de fechas ──
// Fecha Caja: atenuada cuando isCredito (no se registra la fecha)
// Fecha Resultado: atenuada cuando categoría es Inversión/Bienes
function updateDimming() {
  fieldCaja.classList.toggle("dimmed", isCredito);
  fieldRdo.classList.toggle("dimmed",  SOLO_CAJA.includes(selected));
}

// ── Toggles ──
const btnTipo    = document.getElementById("btn-tipo");
const btnTarjeta = document.getElementById("btn-tarjeta");
const btnMoneda  = document.getElementById("btn-moneda");
const signEl     = document.getElementById("amount-sign");

function renderToggles() {
  btnTipo.textContent    = isGasto ? "Gasto" : "Ingreso";
  btnTipo.className      = "toggle-btn " + (isGasto ? "gasto" : "ingreso");
  signEl.textContent     = isGasto ? "−" : "+";
  signEl.className       = "amount-sign " + (isGasto ? "neg" : "pos");
  btnTarjeta.textContent = isCredito ? "Crédito" : "Débito";
  btnTarjeta.className   = "toggle-btn " + (isCredito ? "credito" : "debito");
  btnMoneda.textContent  = isUSD ? "USD" : "ARS";
  btnMoneda.className    = "toggle-btn " + (isUSD ? "usd" : "ars");
  updateDimming();
}

btnTipo.addEventListener("click", () => {
  isGasto = !isGasto;
  selected = null; selectedEmoji = "";
  document.getElementById("btn-confirm").disabled = true;
  document.getElementById("search-input").value = "";
  buildCats(); renderToggles();
});
btnTarjeta.addEventListener("click", () => { isCredito = !isCredito; renderToggles(); });
btnMoneda.addEventListener("click",  () => { isUSD = !isUSD; renderToggles(); });

// ── Categorías ──
function buildCats() {
  const grid = document.getElementById("cat-grid");
  grid.innerHTML = "";
  const cats = isGasto ? CATS_GASTO : CATS_INGRESO;
  cats.forEach(([emoji, name]) => {
    if (emoji === SEP) {
      const sep = document.createElement("div");
      sep.className = "cat-separator";
      grid.appendChild(sep);
      return;
    }
    const btn = document.createElement("button");
    btn.className     = "cat-item";
    btn.dataset.name  = name.toLowerCase();
    btn.dataset.emoji = emoji;
    btn.innerHTML     = `<span class="cat-emoji">${emoji}</span><span class="cat-name">${name}</span>`;
    btn.addEventListener("click", () => {
      document.querySelectorAll(".cat-item").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selected = name; selectedEmoji = emoji;
      document.getElementById("btn-confirm").disabled = false;
      updateDimming(); // actualizar atenuado al cambiar categoría
      btn.scrollIntoView({ behavior: "smooth", block: "nearest" });
    });
    grid.appendChild(btn);
  });
}

buildCats();
renderToggles();

// ── Search ──
document.getElementById("search-input").addEventListener("input", e => {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll(".cat-item").forEach(btn => {
    btn.classList.toggle("hidden", q.length > 0 && !btn.dataset.name.includes(q));
  });
  document.querySelectorAll(".cat-separator").forEach(sep => {
    const siblings = [...sep.parentElement.children];
    const idx = siblings.indexOf(sep);
    const nextVisible = siblings.slice(idx+1).some(
      el => el.classList.contains("cat-item") && !el.classList.contains("hidden")
    );
    sep.style.display = q && !nextVisible ? "none" : "";
  });
});

// ── Barra de progreso ──
let stepsTimeout, creepInterval, closeTimer;

function iniciarBarra() {
  const bar = document.getElementById("progress-bar");
  bar.style.transition = "none";
  bar.style.width = "0%";
  void bar.offsetWidth;
  setTimeout(() => {
    bar.style.transition = "width 0.9s cubic-bezier(0.2,0.8,0.2,1)";
    bar.style.width = "45%";
  }, 30);
  stepsTimeout = setTimeout(() => {
    bar.style.transition = "width 1.4s cubic-bezier(0.1,0.8,0.4,1)";
    bar.style.width = "78%";
  }, 900);
  creepInterval = setInterval(() => {
    const w = parseFloat(bar.style.width);
    if (w < 96) {
      bar.style.transition = "width 0.6s linear";
      bar.style.width = (w + 1) + "%";
    }
  }, 1200);
}

function finalizarBarra() {
  clearTimeout(stepsTimeout);
  clearInterval(creepInterval);
  const bar = document.getElementById("progress-bar");
  bar.style.transition = "width 0.2s ease-out";
  bar.style.width = "100%";
  // Cierre automático rápido — cancelable con "Registrar Otro"
  closeTimer = setTimeout(() => window.close(), 500);
}

// ── Confirmar ──
document.getElementById("btn-confirm").addEventListener("click", async () => {
  if (!selected) return;
  const montoRaw = document.getElementById("monto-input").value.trim();
  if (!montoRaw) return;
  // Parsear y validar
  const montoNum = parsearNumero(montoRaw);
  if (isNaN(montoNum) || montoNum <= 0) return;
  // Formato para mostrar en pantalla de carga
  const montoDisplay = formatearDisplay(montoNum);
  // Formato para enviar al sheet: sin punto, con coma decimal si aplica
  const montoSheet = formatearSheet(montoNum);

  const fechaCajaSheet = formatDate(inputCaja.value);
  const fechaRdoSheet  = formatDate(inputRdo.value);
  const esSoloCaja     = SOLO_CAJA.includes(selected);

  // Echo fechas — ocultar las que no aplican y posicionar la solitaria a la derecha
  const echoCaja = document.getElementById("echo-block-caja");
  const echoRdo  = document.getElementById("echo-block-rdo");
  const echoBlockCajaOculto = isCredito;
  const echoBlockRdoOculto  = esSoloCaja;
  echoCaja.classList.toggle("hidden-date", echoBlockCajaOculto);
  echoRdo.classList.toggle("hidden-date",  echoBlockRdoOculto);
  // Si solo Resultado visible → ponerlo a la derecha con un spacer invisible a la izquierda
  const soloRdo = echoBlockCajaOculto && !echoBlockRdoOculto;
  echoCaja.style.visibility = soloRdo ? "hidden" : "";
  echoCaja.style.display    = (!echoBlockCajaOculto || soloRdo) ? "" : "none";
  echoRdo.style.display     = echoBlockRdoOculto ? "none" : "";

  document.getElementById("echo-caja").textContent = fechaCajaSheet;
  document.getElementById("echo-rdo").textContent  = fechaRdoSheet;

  const echoSign = document.getElementById("echo-sign");
  echoSign.textContent = isGasto ? "−" : "+";
  echoSign.className   = "echo-sign " + (isGasto ? "neg" : "pos");
  document.getElementById("echo-monto").textContent    = montoDisplay;
  document.getElementById("echo-currency").textContent = isUSD ? "USD" : "ARS";

  document.getElementById("echo-tarjeta-emoji").textContent = isCredito ? "💳" : "🏦";
  document.getElementById("echo-tarjeta-name").textContent  = isCredito ? "Crédito" : "Débito";
  document.getElementById("echo-emoji").textContent         = selectedEmoji;
  document.getElementById("echo-cat-name").textContent      = selected;

  showOverlay("ov-loading");
  iniciarBarra();

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      keepalive: true,
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        descripcion:    textoParam,
        app:            appParam,
        categoria:      selected,
        yaConSigno:     true,
        soloCaja:       esSoloCaja,
        esGasto:        isGasto,
        esCredito:      isCredito,
        esUSD:          isUSD,
        montoRaw:       montoSheet,   // formato sheet: sin punto, coma decimal
        fechaResultado: fechaRdoSheet,
        fechaCaja:      fechaCajaSheet
      })
    });
    finalizarBarra();
  } catch {
    clearTimeout(stepsTimeout);
    clearInterval(creepInterval);
    hideAll();
    showOverlay("ov-error");
  }
});

// ── Registrar Otro: cancela cierre y abre nueva pestaña ──
document.getElementById("btn-otro").addEventListener("click", () => {
  if (closeTimer) clearTimeout(closeTimer);
  window.open(window.location.href.split("?")[0], "_blank");
});

function showOverlay(id) { hideAll(); document.getElementById(id).classList.add("show"); }
function hideAll() { document.querySelectorAll(".overlay").forEach(o => o.classList.remove("show")); }
</script>
</body>
